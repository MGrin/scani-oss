# Local development stack for Scani — fully self-contained.
#
# Quick start:
#   cp .env.example .env
#   bun run dev:stack          # or: docker compose --profile full up -d --build
#
# No production dependencies: Postgres, Redis, SMTP (Mailpit), and S3-compatible
# object storage (MinIO) all run in containers.
#
# Default ports (host-side offsets to avoid clashing with other local services):
#   Postgres        : localhost:5433
#   Redis           : localhost:6380
#   API             : localhost:3011
#   Frontend        : localhost:5173   (apps/frontend/app — the user-facing SPA)
#   Data-provider   : localhost:8082   (apps/backend/data-provider — tRPC + Better-Auth)
#   Mailpit         : SMTP localhost:1026, UI http://localhost:8026
#   MinIO           : S3 API localhost:9000, console http://localhost:9001 (minioadmin/minioadmin)

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scani
      POSTGRES_PASSWORD: scani
      POSTGRES_DB: scani
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scani -d scani"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    ports:
      - "1026:1025"   # SMTP
      - "8026:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # S3-compatible object storage. Stands in for any S3/R2 bucket in local
  # dev so screenshot + file-import flows work without a cloud account.
  # Data persists in the named volume; reset with `docker compose down -v`.
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot bucket creator. Exits as soon as the dev bucket exists.
  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/job-uploads-dev &&
        mc anonymous set public local/job-uploads-dev &&
        echo "✅ MinIO bucket job-uploads-dev ready"
    restart: "no"

  # Materializes per-app .env files from the root .env. Consumers run
  # `bun dev` on the host against those files; the compose services below
  # receive env via the compose file directly, so this step is not on
  # their critical path — but it makes the "one root .env" contract work
  # for both docker and host-side dev.
  env-sync:
    image: oven/bun:1.3.13
    container_name: env-sync
    working_dir: /app
    volumes:
      - .:/app
    command: ["bun", "scripts/sync-env.ts"]
    restart: "no"

  # Populates the shared node_modules volume once so the frontend dev
  # server can read from it without running its own install.
  # `bun install --frozen-lockfile` is a verified no-op on subsequent
  # boots — the volume persists across `compose up` calls.
  deps:
    image: oven/bun:1.3.13
    container_name: deps
    working_dir: /app
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    command: ["bun", "install", "--frozen-lockfile"]
    restart: "no"

  # Schema + seed runner. One-shot container that applies the migrations
  # against postgres, then exits. Decoupled from the app runtime images
  # (which are debian:slim + a compiled binary, no bun) — runs migrations
  # via the bun base image with the workspace mounted, same pattern as
  # the `deps` service above.
  migrate:
    profiles: ["full", "migrate"]
    image: oven/bun:1.3.13
    container_name: migrate
    working_dir: /app
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      deps:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
    command: ["bun", "run", "packages/infra/db/src/migrate.ts"]
    restart: "no"

  # Data-provider owns every outbound third-party API call (pricing, AI,
  # public-chain RPCs, email, object storage, OG fetch). The api + worker
  # reach it over the compose network via SCANI_CLOUD_URL. The contract
  # (tRPC over HTTP + Bearer) is identical wherever the binary runs.
  data-provider:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/backend/data-provider/Dockerfile
    image: data-provider:dev
    container_name: data-provider
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      env-sync:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "8082"
      HOST: "0.0.0.0"
      SERVICE_NAME: data-provider
      REDIS_URL: redis://redis:6379
      # Dev-only shared secret. The api + worker below use the same value
      # for SCANI_CLOUD_API_KEY so the bearer check on the receiving end
      # matches. Use a real, randomly-generated key in production.
      DATA_PROVIDER_API_KEY: dev_data_provider_key_change_me_not_prod_safe
      # Cloud-management (Tier 2/3) wiring — enabled in dev so the cloud
      # API surface works out of the box. `cloud_*` tables live alongside
      # the api's tables in the same Postgres; the `migrate` step creates
      # them.
      CLOUD_MANAGEMENT_ENABLED: "true"
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
      BETTER_AUTH_SECRET: dev_cloud_better_auth_secret_change_me_not_prod_safe
      BETTER_AUTH_URL: http://localhost:8082
      CLOUD_FRONTEND_ORIGIN: http://localhost:5176
      # Fastmail is intentionally disabled in dev so magic-link / OTP /
      # verification emails land in Mailpit (SMTP_URL below). A root .env
      # or shell FASTMAIL_API_TOKEN is overridden to an empty string here —
      # the email router treats empty as "not configured" and falls
      # through to SMTP_URL. To test Fastmail in dev, comment this line out
      # and ensure FASTMAIL_API_TOKEN is set in root .env or your shell.
      FASTMAIL_API_TOKEN: ""
      # With no Fastmail token and no SMTP_URL set, the email-send path
      # throws. Point it at Mailpit so dev emails (auth, verification,
      # magic links) land in the inspector at http://localhost:8026.
      SMTP_URL: smtp://mailpit:1025
      SMTP_FROM: '"Scani Cloud" <cloud@example.local>'
      # Object storage → MinIO. S3_ENDPOINT is the in-network URL the
      # data-provider hits; S3_PUBLIC_ENDPOINT is what gets baked into
      # presigned URLs for the browser (which can't resolve `minio:9000`).
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: job-uploads-dev

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/backend/api/Dockerfile
    image: api:dev
    container_name: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      env-sync:
        condition: service_completed_successfully
      data-provider:
        condition: service_started
    ports:
      - "3011:8080"
    # Root .env flows through — the `environment:` block below overrides any
    # key that needs a container-network URL instead of the host-side default
    # (DATABASE_URL, REDIS_URL, SMTP_URL, S3_ENDPOINT, …). Everything else —
    # API keys, feature flags — is read straight from the root .env.
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "8080"
      HOST: "0.0.0.0"
      SERVICE_NAME: api
      # Service-to-service URLs (compose network hostnames).
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
      REDIS_URL: redis://redis:6379
      SMTP_URL: smtp://mailpit:1025
      SMTP_FROM: no-reply@example.local
      # Browser-reachable URLs.
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:3011
      # Secrets — dev placeholders only.
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      BETTER_AUTH_SECRET: dev_secret_change_me_this_is_not_production_safe
      JOBS_HMAC_SECRET: dev_jobs_hmac_change_me_not_prod_safe
      # Object storage → MinIO. S3_ENDPOINT is what server code hits;
      # S3_PUBLIC_ENDPOINT is what the api bakes into presigned URLs for
      # the browser (which can't resolve `minio:9000`).
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: job-uploads-dev
      # Data-provider wiring — the api reads pricing/AI/chain provider
      # access from the data-provider over this URL.
      SCANI_CLOUD_URL: http://data-provider:8082
      SCANI_CLOUD_API_KEY: dev_data_provider_key_change_me_not_prod_safe

  worker:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/backend/worker/Dockerfile
    image: worker:dev
    container_name: worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      env-sync:
        condition: service_completed_successfully
      data-provider:
        condition: service_started
    # Root .env flows through; the `environment:` block overrides keys that
    # need container-network URLs (DATABASE_URL, REDIS_URL, S3_ENDPOINT).
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      SERVICE_NAME: worker
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
      REDIS_URL: redis://redis:6379
      # Must match the api's ENCRYPTION_KEY so integration credentials
      # persisted by the api can be decrypted at job-run time.
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      WORKER_CONCURRENCY: "4"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: job-uploads-dev
      SCANI_CLOUD_URL: http://data-provider:8082
      SCANI_CLOUD_API_KEY: dev_data_provider_key_change_me_not_prod_safe

  # Frontend SPA dev server. Source is mounted read-write so edits on the
  # host trigger HMR inside the container; node_modules is the shared
  # volume populated by the `deps` init container. `--host 0.0.0.0` is
  # required for the port forwarding to reach the browser.
  frontend:
    profiles: ["full"]
    image: oven/bun:1.3.13
    container_name: frontend
    working_dir: /app/apps/frontend/app
    depends_on:
      api:
        condition: service_started
      env-sync:
        condition: service_completed_successfully
      deps:
        condition: service_completed_successfully
    environment:
      VITE_API_URL: http://localhost:3011
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    command: ["bun", "run", "vite", "--host", "0.0.0.0"]

volumes:
  postgres-data:
  redis-data:
  minio-data:
  workspace-node-modules:
