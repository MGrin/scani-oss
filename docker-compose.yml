# Local development stack for scani — fully self-contained.
#
# Quick start:
#   cp .env.example .env
#   bun run dev:stack          # or: docker compose --profile full up -d --build
#
# No production dependencies: Postgres, Redis, SMTP (Mailpit), and S3-compatible
# object storage (MinIO) all run in containers.
#
# Default ports (host-side offsets to avoid clashing with other local services):
#   Postgres        : localhost:5433
#   Redis           : localhost:6380
#   Backend         : localhost:3011
#   Frontend        : localhost:5173   (apps/frontend/app — the user-facing SPA)
#   Landing         : localhost:5174   (apps/frontend/landing — marketing site)
#   Admin           : localhost:5175   (apps/frontend/admin — BullMQ + ops dashboard)
#   Cloud frontend  : localhost:5176   (apps/frontend/cloud — Tier 2 console, api.cloud.scani.xyz in prod)
#   Data-provider   : localhost:8082   (apps/backend/data-provider — tRPC + Better-Auth)
#   Mailpit         : SMTP localhost:1026, UI http://localhost:8026
#   MinIO           : S3 API localhost:9000, console http://localhost:9001 (minioadmin/minioadmin)

services:
  postgres:
    image: postgres:16-alpine
    container_name: scani-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scani
      POSTGRES_PASSWORD: scani
      POSTGRES_DB: scani
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scani -d scani"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: scani-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: scani-mailpit
    restart: unless-stopped
    ports:
      - "1026:1025"   # SMTP
      - "8026:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # S3-compatible object storage. Stands in for Cloudflare R2 in local dev
  # so screenshot + file-import flows work without a cloud account. Data
  # persists in the named volume; reset with `docker compose down -v`.
  minio:
    image: minio/minio:latest
    container_name: scani-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot bucket creator. Exits as soon as the dev bucket exists.
  minio-init:
    image: minio/mc:latest
    container_name: scani-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/scani-job-uploads-dev &&
        mc anonymous set public local/scani-job-uploads-dev &&
        echo "✅ MinIO bucket scani-job-uploads-dev ready"
    restart: "no"

  # Materializes per-app .env files from the root .env. Consumers run
  # `bun dev` on the host against those files; the compose services below
  # receive env via the compose file directly, so this step is not on
  # their critical path — but it makes the "one root .env" contract work
  # for both docker and host-side dev.
  env-sync:
    image: oven/bun:1.3.13
    container_name: scani-env-sync
    working_dir: /app
    volumes:
      - .:/app
    command: ["bun", "scripts/sync-env.ts"]
    restart: "no"

  # Populates the shared node_modules volume once so frontend / admin /
  # landing can all read from it without each running their own install.
  # `bun install --frozen-lockfile` is a verified no-op on subsequent
  # boots — the volume persists across `compose up` calls.
  deps:
    image: oven/bun:1.3.13
    container_name: scani-deps
    working_dir: /app
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    command: ["bun", "install", "--frozen-lockfile"]
    restart: "no"

  # Schema + seed runner. One-shot container that applies the migrations
  # against postgres, then exits. Decoupled from the app runtime images
  # (which are debian:slim + a compiled binary, no bun) — runs migrations
  # via the bun base image with the workspace mounted, same pattern as
  # the `deps` service above.
  migrate:
    profiles: ["full", "migrate"]
    image: oven/bun:1.3.13
    container_name: scani-migrate
    working_dir: /app
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      deps:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
    command: ["bun", "run", "packages/infra/db/src/migrate.ts"]
    restart: "no"

  # Data-provider owns every outbound Scani-managed third-party API call
  # (pricing, AI, public-chain RPCs, email, object storage, OG fetch).
  # Backend + worker reach it over the compose network via SCANI_CLOUD_URL.
  # In managed tiers this binary runs on Fly (cloud.scani.xyz) instead; the
  # contract (tRPC over HTTP + Bearer) is identical.
  data-provider:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/backend/data-provider/Dockerfile
    image: scani-data-provider:dev
    container_name: scani-data-provider
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      env-sync:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "8082"
      HOST: "0.0.0.0"
      SERVICE_NAME: scani-data-provider
      REDIS_URL: redis://redis:6379
      # Dev-only shared secret. Backend + worker below use the same value
      # for SCANI_CLOUD_API_KEY so the bearer check on the receiving end
      # matches. Prod uses a real Scani-issued key.
      DATA_PROVIDER_API_KEY: dev_data_provider_key_change_me_not_prod_safe
      # Cloud-management (Tier 2/3) wiring — enabled in dev so the cloud-
      # frontend console at http://localhost:5176 works out of the box.
      # `cloud_*` tables live alongside the backend's tables in the same
      # Postgres; migration 0050 creates them during the `migrate` step.
      CLOUD_MANAGEMENT_ENABLED: "true"
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
      BETTER_AUTH_SECRET: dev_cloud_better_auth_secret_change_me_not_prod_safe
      BETTER_AUTH_URL: http://localhost:8082
      CLOUD_FRONTEND_ORIGIN: http://localhost:5176
      # Fastmail is intentionally disabled in dev so magic-link / OTP /
      # verification emails from BOTH the cloud-frontend's own Better-Auth
      # flow AND the backend's email.send tRPC land in Mailpit (SMTP_URL
      # below). Root .env / shell FASTMAIL_API_TOKEN is overridden to an
      # empty string here — the data-provider's email router treats empty
      # as "not configured" and falls through to SMTP_URL. To test
      # Fastmail in dev, comment this line out and ensure FASTMAIL_API_TOKEN
      # is set in root .env or your shell.
      FASTMAIL_API_TOKEN: ""
      # Backend's Better-Auth ships every email through the data-provider
      # via @scani/cloud-client/adapters/email → email.send tRPC. With no
      # Fastmail token and no SMTP_URL set, that mutation throws and the
      # backend surfaces it as "Failed to send magic link". Point it at
      # Mailpit so dev emails (auth, verification, magic links) land in
      # the inspector at http://localhost:8026.
      SMTP_URL: smtp://mailpit:1025
      SMTP_FROM: '"Scani Cloud" <cloud@scani.local>'
      # Object storage → MinIO. S3_ENDPOINT is the in-network URL the
      # data-provider hits; S3_PUBLIC_ENDPOINT is what gets baked into
      # presigned URLs for the browser (which can't resolve `minio:9000`).
      # Same shape as the backend service below — both override the
      # `localhost`-flavoured defaults coming from the root .env so the
      # data-provider can actually reach MinIO from inside the compose
      # network and the backend's /health/r2 probe stops returning 503.
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: scani-job-uploads-dev

  backend:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/backend/api/Dockerfile
    image: scani-backend:dev
    container_name: scani-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      env-sync:
        condition: service_completed_successfully
      data-provider:
        condition: service_started
    ports:
      - "3011:8080"
    # Root .env flows through — the `environment:` block below overrides any
    # key that needs a container-network URL instead of the host-side default
    # (DATABASE_URL, REDIS_URL, SMTP_URL, S3_ENDPOINT, …). Everything else —
    # API keys, feature flags — is read straight from the root .env.
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      PORT: "8080"
      HOST: "0.0.0.0"
      SERVICE_NAME: scani-backend
      # Service-to-service URLs (compose network hostnames).
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
      REDIS_URL: redis://redis:6379
      SMTP_URL: smtp://mailpit:1025
      SMTP_FROM: no-reply@scani.local
      # Browser-reachable URLs.
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:3011
      # Secrets — dev placeholders only.
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      BETTER_AUTH_SECRET: dev_secret_change_me_this_is_not_production_safe
      ADMIN_JOBS_HMAC_SECRET: dev_admin_hmac_change_me_not_prod_safe
      # Object storage → MinIO. S3_ENDPOINT is what server code hits;
      # S3_PUBLIC_ENDPOINT is what the backend bakes into presigned URLs
      # for the browser (which can't resolve `minio:9000`).
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: scani-job-uploads-dev
      # Data-provider wiring. Once phase 1+ land, backend drops its direct
      # provider keys (COINGECKO_*, ETHERSCAN_*, ...) and reads them from
      # the data-provider over this URL instead.
      SCANI_CLOUD_URL: http://data-provider:8082
      SCANI_CLOUD_API_KEY: dev_data_provider_key_change_me_not_prod_safe

  worker:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/backend/worker/Dockerfile
    image: scani-worker:dev
    container_name: scani-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
      env-sync:
        condition: service_completed_successfully
      data-provider:
        condition: service_started
    # Root .env flows through; the `environment:` block overrides keys that
    # need container-network URLs (DATABASE_URL, REDIS_URL, S3_ENDPOINT).
    env_file:
      - path: ./.env
        required: false
    environment:
      NODE_ENV: development
      SERVICE_NAME: scani-worker
      DATABASE_URL: postgres://scani:scani@postgres:5432/scani?sslmode=disable
      REDIS_URL: redis://redis:6379
      # Must match the backend's ENCRYPTION_KEY so integration credentials
      # persisted by the backend can be decrypted at job-run time.
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      WORKER_CONCURRENCY: "4"
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: scani-job-uploads-dev
      SCANI_CLOUD_URL: http://data-provider:8082
      SCANI_CLOUD_API_KEY: dev_data_provider_key_change_me_not_prod_safe

  # --- JS apps -----------------------------------------------------------------
  # All three JS apps share a single node_modules volume populated by the
  # `deps` init container. Source is mounted read-write so edits on the
  # host trigger HMR inside the container. `--host 0.0.0.0` is required
  # for the port forwarding to reach the browser.
  # -----------------------------------------------------------------------------

  frontend:
    profiles: ["full"]
    image: oven/bun:1.3.13
    container_name: scani-frontend
    working_dir: /app/apps/frontend/app
    depends_on:
      backend:
        condition: service_started
      env-sync:
        condition: service_completed_successfully
      deps:
        condition: service_completed_successfully
    environment:
      VITE_API_URL: http://localhost:3011
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    command: ["bun", "run", "vite", "--host", "0.0.0.0"]

  landing:
    profiles: ["full"]
    image: oven/bun:1.3.13
    container_name: scani-landing
    working_dir: /app/apps/frontend/landing
    depends_on:
      env-sync:
        condition: service_completed_successfully
      deps:
        condition: service_completed_successfully
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    command: ["bun", "run", "vite", "--host", "0.0.0.0", "--port", "5174"]

  # Tier 2 console. Same shape as `admin` / `landing` — a plain Vite dev
  # server against the mounted source tree. Proxies `/trpc` + `/api/auth`
  # to the data-provider container so Better-Auth cookies stay scoped to
  # the same host the browser is hitting (localhost:5176).
  cloud-frontend:
    profiles: ["full"]
    image: oven/bun:1.3.13
    container_name: scani-cloud-frontend
    working_dir: /app/apps/frontend/cloud
    depends_on:
      data-provider:
        condition: service_started
      env-sync:
        condition: service_completed_successfully
      deps:
        condition: service_completed_successfully
    environment:
      # Server-only — Vite dev-server uses this for the /trpc + /api/auth
      # proxy target. The browser sends relative URLs (VITE_DATA_PROVIDER_URL
      # stays unset here on purpose) so the session cookie ends up scoped
      # to localhost:5176 and the whole stack looks same-origin.
      DATA_PROVIDER_PROXY_TARGET: http://data-provider:8082
    ports:
      - "5176:5176"
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    command: ["bun", "run", "vite", "--host", "0.0.0.0", "--port", "5176"]

  admin:
    profiles: ["full"]
    image: oven/bun:1.3.13
    container_name: scani-admin
    working_dir: /app/apps/frontend/admin
    depends_on:
      backend:
        condition: service_started
      env-sync:
        condition: service_completed_successfully
      deps:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      # Admin reaches the backend over the compose network for HMAC-signed
      # BullMQ actions. The browser still hits the public localhost URL.
      BACKEND_BASE_URL: http://backend:8080
      ADMIN_JOBS_HMAC_SECRET: dev_admin_hmac_change_me_not_prod_safe
      ADMIN_DEV_BYPASS: "1"
    ports:
      - "5175:5175"
    volumes:
      - .:/app
      - workspace-node-modules:/app/node_modules
    command: ["bun", "run", "next", "dev", "-H", "0.0.0.0", "--port", "5175"]

volumes:
  postgres-data:
  redis-data:
  minio-data:
  workspace-node-modules:
