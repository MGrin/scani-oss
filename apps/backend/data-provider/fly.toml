app            = "scani-data-provider"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT         = "8082"
  HOST         = "0.0.0.0"
  NODE_ENV     = "production"
  SERVICE_NAME = "scani-data-provider"

[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = "off"
  auto_start_machines  = true
  # Two machines is the minimum that lets a rolling deploy swap one out
  # while the other keeps serving — backend + worker would 5xx on every
  # outbound call during a single-machine cutover. Per-provider rate
  # limiter state lives in Redis so the two replicas share fairness.
  min_machines_running = 2
  max_machines_running = 2

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    # 30s was too tight: rolling deploys occasionally timed out on the
    # second machine because boot-time work (10 provider factories,
    # ioredis connect, typedi singletons, Better-Auth setup if cloud
    # management is on) plus shared-cpu jitter exceeded the window. Bump
    # to 60s — same shape as a TCP keep-alive probe, no impact on steady
    # state.
    grace_period = "60s"
    method       = "GET"
    path         = "/health"

[http_service.http_options]
  idle_timeout = 120

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "1024mb"
  cpu_kind = "shared"
  cpus     = 1
  # 512MB was tight at boot — 10 provider factories plus typedi + ioredis
  # + (when CLOUD_MANAGEMENT_ENABLED) Postgres pool + Better-Auth pushed
  # the second-machine of the rolling deploy past the health-check
  # window on 2026-05-09. Match the worker's 1024MB sizing — same Bun
  # runtime, similar dependency surface — to give the rolling deploy
  # headroom.

[deploy]
  # Rolling deploy: one machine at a time so the other keeps serving
  # backend + worker during the cutover. Single-machine "immediate"
  # caused short bursts of 5xx on every deploy.
  strategy = "rolling"
  max_unavailable = 1
