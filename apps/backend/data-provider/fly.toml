app            = "scani-data-provider"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT         = "8082"
  HOST         = "0.0.0.0"
  NODE_ENV     = "production"
  SERVICE_NAME = "scani-data-provider"
  # Internal mailbox for beta-preview waitlist signup notifications.
  # Public address; safe to keep in the repo. The waitlist router
  # silently no-ops the ops notification when this is unset.
  WAITLIST_OPS_EMAIL = "waitlist@scani.xyz"
  WAITLIST_OPS_FROM  = "\"Scani Waitlist\" <waitlist@scani.xyz>"

[http_service]
  internal_port        = 8082
  force_https          = true
  auto_stop_machines   = "off"
  auto_start_machines  = true
  # Single machine: the redundant pair cost ~$11/mo for a pre-revenue
  # beta. Deploys briefly 5xx backend/worker outbound calls during the
  # cutover — callers retry with backoff (see @scani/rate-limiter), and
  # the enqueue sweepers recover anything dropped. Scale back to 2 when
  # traffic justifies it.
  min_machines_running = 1
  max_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 100
    hard_limit = 150

  [[http_service.checks]]
    interval     = "30s"
    timeout      = "5s"
    # /ready is gated on the deferred-boot IIFE (see src/index.ts):
    # - Process listens on the port within milliseconds of start →
    #   smoke check passes immediately.
    # - /ready returns 503 until provider registry + cloud DB +
    #   Better-Auth init complete; flips to 200 once `bootState.ready`
    #   is true.
    # Result: Fly only routes traffic to a replica that's fully ready,
    # AND grace_period only needs to cover the time between machine-up
    # and the first successful /ready (not the entire boot).
    grace_period = "60s"
    method       = "GET"
    path         = "/ready"

[http_service.http_options]
  idle_timeout = 120

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "1024mb"
  cpu_kind = "shared"
  cpus     = 1
  # 512MB was tight at boot. Memory stays at 1024MB matching the worker
  # — the deferred-boot pattern (see src/index.ts) keeps grace_period
  # tight, but boot-time memory is still ~10 provider factories +
  # typedi + ioredis + (when CLOUD_MANAGEMENT_ENABLED) Postgres pool +
  # Better-Auth, which 512MB couldn't comfortably absorb under
  # shared-CPU contention.

[deploy]
  # Single machine: short 5xx burst per deploy, accepted for the cost
  # savings (callers retry; sweepers recover dropped enqueues).
  strategy = "rolling"
  max_unavailable = 1
