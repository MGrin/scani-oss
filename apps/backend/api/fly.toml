app            = "scani-backend"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT         = "8080"
  HOST         = "0.0.0.0"
  NODE_ENV     = "production"
  # `WebSocketRealtimeUpdatesService` (api-only — owns local WS state)
  # refuses to construct unless SERVICE_NAME=scani-backend at boot. Worker
  # / data-provider use the Redis-pub/sub fallback and set their own value.
  SERVICE_NAME = "scani-backend"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 2

  # Two instances for redundancy: a single saturated/unhealthy machine
  # used to make the Fly proxy blackhole 100% of traffic. All shared
  # state — WS pub/sub, rate-limiter buckets, the portfolio-value cache —
  # lives in Redis, so machines stay consistent. Deploys roll one machine
  # at a time (see [deploy]) so an instance is always serving.
  max_machines_running = 2

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 80
    hard_limit = 120

  [[http_service.checks]]
    interval      = "30s"
    # 15s (was 5s): a brief event-loop stall under load must not trip the
    # check critical and have the proxy drop traffic. The /health route is
    # a static handler — a 15s deadline only fires on genuine saturation.
    timeout       = "15s"
    grace_period  = "30s"
    method        = "GET"
    path          = "/health"

# Fly proxy idle_timeout must exceed the longest synchronous op. With the
# BullMQ refactor, requests return quickly — but the WS connection itself
# needs a generous idle timeout so browser tabs stay connected.
[http_service.http_options]
  idle_timeout = 240

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "2048mb"
  cpu_kind = "shared"
  cpus     = 1
  # 512MB → 768MB → 1024MB → 2048MB. Latest bump after the backend was
  # OOM-killed at 07:30:18 UTC on 2026-05-08 (exit_code=137,
  # oom_killed=true) ~18 hours after the previous deploy. Pair this with
  # the connection-monitor leak fix in commit b23e21db ↦ that commit
  # closes the obvious paired-cleanup bug (`endConnectionTracking` was
  # only called in `onAfterHandle`, never in `onError`); 2 GB gives
  # headroom for any remaining slow growth (Sentry breadcrumb queue,
  # postgres.js prepared-statement cache, …) without paging us at the
  # cgroup boundary.

[deploy]
  # Rolling: with two machines, update them one at a time so an instance
  # is always serving. (Was "immediate" when this app ran a single
  # machine, where rolling vs immediate made no practical difference.)
  strategy = "rolling"
