app            = "scani-worker"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV           = "production"
  # 8 job slots: the hourly cron tide takes up to cronConcurrency
  # (ceil(8/2)=4), leaving 4 for user-initiated imports so they don't
  # queue minutes-deep behind scheduled work at 100-1000 users.
  WORKER_CONCURRENCY = "8"
  # Identifies this process for cross-service routing (e.g. realtime
  # picks RedisRealtimeUpdatesService when SERVICE_NAME != scani-backend).
  SERVICE_NAME       = "scani-worker"

# No [http_service] — worker is a background process; nothing to expose.

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "1024mb"
  cpu_kind = "shared"
  cpus     = 1
  # 512MB was tight for the Bun monolith (typedi + Drizzle + every
  # provider + BullMQ); the 35h portfolio-history-backfill on May 2-3
  # was a plausible OOM trigger. 1024MB gives headroom without going
  # to performance-class cpus.

[deploy]
  strategy = "immediate"
