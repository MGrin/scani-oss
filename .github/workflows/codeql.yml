name: CodeQL

# GitHub-hosted static analysis for the whole monorepo. The
# `javascript-typescript` language pack covers both JS and TS in one
# build, so we don't need a matrix. The `security-extended` query
# suite is a superset of the default suite — it runs every default
# query plus higher-coverage (lower-precision) ones.
#
# Results land in the repo's Security → Code scanning tab; the
# workflow also surfaces inline annotations on PRs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly sweep so newly-published query updates re-scan the
    # default branch even when no code has changed.
    - cron: '0 6 * * 0'

permissions:
  security-events: write
  contents: read
  actions: read

concurrency:
  group: codeql-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:javascript-typescript'
