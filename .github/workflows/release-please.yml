name: Release Please

# Maintains a permanent "release PR" tracking unreleased conventional commits
# (feat:, fix:, …) on main. Merging that PR cuts a new semver tag (vX.Y.Z) and
# regenerates CHANGELOG.md.
#
# Tags pushed by the default GITHUB_TOKEN do not trigger downstream `on: push:
# tags` workflows (GitHub anti-loop safety), so we explicitly dispatch
# docker-publish.yml at the new tag ref when release-please cuts a release.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  trigger-docker-publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch docker-publish at the new tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ needs.release-please.outputs.tag_name }}';
            core.info(`Dispatching docker-publish.yml at ref ${tag}`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-publish.yml',
              ref: tag,
            });
