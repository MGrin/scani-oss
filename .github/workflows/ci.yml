name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

# `dorny/paths-filter@v4` reads the PR's changed files via the GitHub
# `listFiles` API, which needs `pull-requests: read`. The repo default
# token only grants `contents/metadata/packages: read`, so without this
# block the detect-changes job fails with "Resource not accessible by
# integration".
permissions:
  contents: read
  pull-requests: read

# Cancel in-flight CI runs for the same ref when a new push lands.
# Intentionally not applied to workflow_call — deploy depends on CI
# completing; cancelling mid-flight would race the deploy.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Path-filter up front so downstream jobs only run when relevant.
  # `code` = anything that could affect runtime behaviour (source files
  # under apps/ or packages/, plus scripts/). `deps` = lockfile or any
  # manifest / linter-config change. Each package has its own filter so
  # the test job can scope `bun test` to just the touched packages.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
      test-paths: ${{ steps.test-paths.outputs.paths }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: none
          filters: |
            code:
              - 'apps/**/*.ts'
              - 'apps/**/*.tsx'
              - 'apps/**/*.js'
              - 'apps/**/*.jsx'
              - 'apps/**/*.mjs'
              - 'apps/**/*.cjs'
              - 'apps/**/*.json'
              - 'apps/**/*.css'
              - 'apps/**/*.html'
              - 'packages/**/*.ts'
              - 'packages/**/*.tsx'
              - 'packages/**/*.js'
              - 'packages/**/*.mjs'
              - 'packages/**/*.cjs'
              - 'packages/**/*.json'
              - 'packages/**/*.sql'
              - 'scripts/**'
              - 'tsconfig*.json'
            deps:
              - 'package.json'
              - 'bun.lock'
              - 'apps/*/package.json'
              - 'packages/*/package.json'
              - 'biome.json'
              - 'biome.jsonc'
              - 'knip.json'
              - 'knip.jsonc'
              - 'knip.ts'
            ai-providers:
              - 'packages/ai-providers/**'
            config:
              - 'packages/config/**'
            db:
              - 'packages/db/**'
            domain:
              - 'packages/domain/**'
            email:
              - 'packages/email/**'
            integrations:
              - 'packages/integrations/**'
            logging:
              - 'packages/logging/**'
            pricing-providers:
              - 'packages/pricing-providers/**'
            queue:
              - 'packages/queue/**'
            rate-limiter:
              - 'packages/rate-limiter/**'
            realtime:
              - 'packages/realtime/**'
            shared:
              - 'packages/shared/**'
            storage:
              - 'packages/storage/**'
      - id: test-paths
        # Collapse per-package filter outputs into a space-separated list
        # that `bun test` accepts as positional args. If `deps` changed
        # and no specific package matched, widen to the full package
        # tree — a lockfile bump can break any test.
        env:
          FILTER_JSON: ${{ toJSON(steps.filter.outputs) }}
          DEPS: ${{ steps.filter.outputs.deps }}
        run: |
          set -euo pipefail
          paths=""
          for p in ai-providers config db domain email integrations logging pricing-providers queue rate-limiter realtime shared storage; do
            changed=$(echo "$FILTER_JSON" | jq -r --arg p "$p" '.[$p] // "false"')
            if [ "$changed" = "true" ]; then
              paths="$paths packages/$p"
            fi
          done
          if [ -z "$paths" ] && [ "$DEPS" = "true" ]; then
            paths="packages/"
          fi
          paths=$(echo $paths | xargs)
          echo "paths=$paths" >> "$GITHUB_OUTPUT"
          echo "test-paths: '$paths'"

  validate-code:
    name: Lint & Type Check
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run type-check

  validate-deps:
    name: Deps sync & knip
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Dependency versions in sync
        run: bun run deps:lint
      - name: Unused code & dependencies (knip)
        run: bun run deps:unused

  test:
    name: Test
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.test-paths != '' }}
    runs-on: ubuntu-latest
    # Postgres is only booted when this job runs. `withTestDb` wraps each
    # test in a rolled-back transaction so tests share the schema but not
    # state. Redis is not needed — the rate-limiter falls through to its
    # in-memory queue when `sharedRedis` is unset.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scani
          POSTGRES_PASSWORD: scani
          POSTGRES_DB: scani
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U scani -d scani"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Run DB migrations
        # Seeds the schema + all required lookup rows (institutions,
        # institution_blockchain_mappings, token types) that repository
        # tests assume are present.
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable
      - name: Test
        run: bun test --preload ./packages/domain/test-preload.ts ${{ needs.detect-changes.outputs.test-paths }} --timeout 30000
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable

  secret-scan:
    # Cheap + high-value: always runs so docs / workflow-only PRs can't
    # slip a leaked key through unchecked.
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Secret scan
        run: |
          set -euo pipefail

          PATTERNS=(
            'api\.render\.com/deploy/[A-Za-z0-9_-]+\?key=[A-Za-z0-9_-]{8,}'
            'AKIA[0-9A-Z]{16}'
            '-----BEGIN (RSA |EC |OPENSSH |)PRIVATE KEY-----'
            'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'
            'eyJhbGciOi[A-Za-z0-9_\-]{100,}'
          )

          FAIL=0
          for p in "${PATTERNS[@]}"; do
            if grep -EnrI \
                --exclude-dir=node_modules \
                --exclude-dir=.git \
                --exclude-dir=dist \
                --exclude-dir=.next \
                --exclude="bun.lock*" \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                -e "$p" . ; then
              echo "::error::Potential secret matched pattern: $p"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Secret scan failed. Rotate the exposed value and remove it from the commit."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"
