name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

# `dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1` reads the PR's changed files via the GitHub
# `listFiles` API, which needs `pull-requests: read`. The repo default
# token only grants `contents/metadata/packages: read`, so without this
# block the detect-changes job fails with "Resource not accessible by
# integration".
permissions:
  contents: read
  pull-requests: read

# Cancel in-flight CI runs for the same ref when a new push lands.
# Intentionally not applied to workflow_call — deploy depends on CI
# completing; cancelling mid-flight would race the deploy.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Path-filter up front so downstream jobs only run when relevant.
  # `code` = anything that could affect runtime behaviour (source files
  # under apps/ or packages/, plus scripts/). `deps` = lockfile or any
  # manifest / linter-config change. Each package has its own filter so
  # the test job can scope `bun test` to just the touched packages.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          list-files: none
          filters: |
            code:
              - 'apps/**/*.ts'
              - 'apps/**/*.tsx'
              - 'apps/**/*.js'
              - 'apps/**/*.jsx'
              - 'apps/**/*.mjs'
              - 'apps/**/*.cjs'
              - 'apps/**/*.json'
              - 'apps/**/*.css'
              - 'apps/**/*.html'
              - 'packages/**/*.ts'
              - 'packages/**/*.tsx'
              - 'packages/**/*.js'
              - 'packages/**/*.mjs'
              - 'packages/**/*.cjs'
              - 'packages/**/*.json'
              - 'packages/**/*.sql'
              - 'scripts/**'
              - 'tsconfig*.json'
            deps:
              - 'package.json'
              - 'bun.lock'
              - 'apps/*/*/package.json'
              - 'packages/*/*/package.json'
              - 'biome.json'
              - 'biome.jsonc'
              - 'knip.json'
              - 'knip.jsonc'
              - 'knip.ts'
            # BEGIN auto:filters (generated by scripts/generate-ci-filters.ts — do not edit)
            cloud-client:
              - 'packages/clients/cloud-client/**'
            config:
              - 'packages/infra/config/**'
            db:
              - 'packages/infra/db/**'
            domain:
              - 'packages/business/domain/**'
            email:
              - 'packages/infra/email/**'
            file-import:
              - 'packages/business/file-import/**'
            http-fetch:
              - 'packages/infra/http-fetch/**'
            ingesters:
              - 'packages/business/ingesters/**'
            jobs:
              - 'packages/business/jobs/**'
            logging:
              - 'packages/infra/logging/**'
            providers:
              - 'packages/clients/providers/**'
            providers-google-sheets:
              - 'packages/clients/providers-google-sheets/**'
            queue:
              - 'packages/infra/queue/**'
            rate-limiter:
              - 'packages/infra/rate-limiter/**'
            realtime:
              - 'packages/infra/realtime/**'
            security:
              - 'packages/infra/security/**'
            shared:
              - 'packages/business/shared/**'
            storage:
              - 'packages/infra/storage/**'
            ui:
              - 'packages/frontend/ui/**'
            # END auto:filters
            data-provider:
              - 'apps/backend/data-provider/**'

  validate-code:
    name: Lint & Type Check
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run type-check

  validate-deps:
    name: Deps sync & knip
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun
      - name: Dependency versions in sync
        run: bun run deps:lint
      - name: Unused code & dependencies (knip)
        run: bun run deps:unused
      - name: CI filter list in sync with workspaces
        run: bun run ci:gen:check

  test:
    name: Test
    needs: detect-changes
    # Run the full repo suite whenever any code or dependency changed.
    # The suite finishes in ~13s on the GH runner — much cheaper than
    # the per-package scoping it replaced, and immune to "PR only touches
    # apps/backend/api so test job skips entirely" gaps.
    if: ${{ needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    # Postgres is only booted when this job runs. `withTestDb` wraps each
    # test in a rolled-back transaction so tests share the schema but not
    # state. Redis is not needed — the rate-limiter falls through to its
    # in-memory queue when `sharedRedis` is unset.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scani
          POSTGRES_PASSWORD: scani
          POSTGRES_DB: scani
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U scani -d scani"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun
      - name: Run DB migrations
        # Seeds the schema + all required lookup rows (institutions,
        # institution_blockchain_mappings, token types) that repository
        # tests assume are present.
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable
      - name: Test
        # Preload + timeout come from `bunfig.toml` at the repo root —
        # the package.json `test` script restates them for clarity.
        run: bun run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable

  secret-scan:
    # Cheap + high-value: always runs so docs / workflow-only PRs can't
    # slip a leaked key through unchecked.
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Secret scan
        run: |
          set -euo pipefail

          # Patterns target the actual secret shapes used in this monorepo.
          # When adding a new one: validate against a real value (rotate it
          # afterwards), test the regex doesn't fire on docs/test fixtures,
          # and prefer narrow shapes that won't fire on environment-variable
          # placeholder names in .env.example.
          PATTERNS=(
            # AWS access key + Render deploy hook
            'api\.render\.com/deploy/[A-Za-z0-9_-]+\?key=[A-Za-z0-9_-]{8,}'
            'AKIA[0-9A-Z]{16}'
            # Private keys (any flavor)
            '-----BEGIN (RSA |EC |OPENSSH |OPENPGP |)PRIVATE KEY-----'
            # Slack
            'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'
            # GitHub: classic + fine-grained PATs + OAuth/installation tokens
            'ghp_[A-Za-z0-9]{36,}'
            'github_pat_[A-Za-z0-9_]{82,}'
            'gho_[A-Za-z0-9]{36,}'
            'ghs_[A-Za-z0-9]{36,}'
            'ghu_[A-Za-z0-9]{36,}'
            # OpenAI + Anthropic API keys
            'sk-(proj-)?[A-Za-z0-9_\-]{40,}'
            'sk-ant-(api|sid)[0-9]{2}-[A-Za-z0-9_\-]{80,}'
            # Stripe live keys (test keys are sk_test_ — allow those)
            'sk_live_[0-9a-zA-Z]{24,}'
            'pk_live_[0-9a-zA-Z]{24,}'
            'rk_live_[0-9a-zA-Z]{24,}'
            # Sentry user + org auth tokens
            'sntrys_eyJ[A-Za-z0-9_\-]{40,}'
            'sntryu_[0-9a-f]{60,}'
            # Cloudflare API token (v4 shape)
            'cf_v1_[A-Za-z0-9_\-]{32,}'
            # Fastmail JMAP token (`fmu1-`/`fmm1-` prefix on token tokens)
            'fmu1-[a-zA-Z0-9]{6,}-[a-zA-Z0-9_-]+'
            'fmm1-[a-zA-Z0-9]{6,}-[a-zA-Z0-9_-]+'
            # Postgres connection string with credentials (Neon / generic)
            'postgres(ql)?://[A-Za-z0-9._%+\-]+:[^@\s/"<>]{8,}@[A-Za-z0-9._\-]+\.neon\.tech'
            'postgres(ql)?://[A-Za-z0-9._%+\-]+:[^@\s/"<>]{16,}@[A-Za-z0-9._\-]+'
            # Generic high-entropy JWT (kept tighter than before: at least
            # one dot before the long alphanum suffix)
            'eyJhbGciOi[A-Za-z0-9_\-]{40,}\.[A-Za-z0-9_\-]{40,}'
          )

          FAIL=0
          for p in "${PATTERNS[@]}"; do
            if grep -EnrI \
                --exclude-dir=node_modules \
                --exclude-dir=.git \
                --exclude-dir=dist \
                --exclude-dir=.next \
                --exclude-dir=docs \
                --exclude="bun.lock*" \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                --exclude="*.test.ts" \
                --exclude="*.test.tsx" \
                --exclude=".env.example" \
                -e "$p" . ; then
              echo "::error::Potential secret matched pattern: $p"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Secret scan failed. Rotate the exposed value and remove it from the commit."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"
