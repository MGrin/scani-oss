name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

# Cancel in-flight CI runs for the same ref when a new push lands.
# Intentionally not applied to workflow_call — deploy depends on CI
# completing; cancelling mid-flight would race the deploy.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Dependency versions in sync
        run: bun run deps:lint

      - name: Unused code & dependencies (knip)
        run: bun run deps:unused

      - name: Test
        run: bun test --preload ./packages/core/test-preload.ts packages/ --timeout 30000
        env:
          NODE_ENV: test

      - name: Secret scan
        run: |
          set -euo pipefail

          PATTERNS=(
            'api\.render\.com/deploy/[A-Za-z0-9_-]+\?key=[A-Za-z0-9_-]{8,}'
            'AKIA[0-9A-Z]{16}'
            '-----BEGIN (RSA |EC |OPENSSH |)PRIVATE KEY-----'
            'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'
            'eyJhbGciOi[A-Za-z0-9_\-]{100,}'
          )

          FAIL=0
          for p in "${PATTERNS[@]}"; do
            if grep -EnrI \
                --exclude-dir=node_modules \
                --exclude-dir=.git \
                --exclude-dir=dist \
                --exclude-dir=.next \
                --exclude="bun.lock*" \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                -e "$p" . ; then
              echo "::error::Potential secret matched pattern: $p"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Secret scan failed. Rotate the exposed value and remove it from the commit."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"
