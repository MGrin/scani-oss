name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

# `dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1` reads the PR's changed files via the GitHub
# `listFiles` API, which needs `pull-requests: read`. The repo default
# token only grants `contents/metadata/packages: read`, so without this
# block the detect-changes job fails with "Resource not accessible by
# integration".
permissions:
  contents: read
  pull-requests: read

# Cancel in-flight CI runs for the same ref when a new push lands.
# Intentionally not applied to workflow_call — deploy depends on CI
# completing; cancelling mid-flight would race the deploy.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Path-filter up front so downstream jobs only run when relevant.
  # `code` = anything that could affect runtime behaviour (source files
  # under apps/ or packages/, plus scripts/). `deps` = lockfile or any
  # manifest / linter-config change. Each package has its own filter so
  # the test job can scope `bun test` to just the touched packages.
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      deps: ${{ steps.filter.outputs.deps }}
      docs: ${{ steps.filter.outputs.docs }}
      prod-guards: ${{ steps.filter.outputs.prod-guards }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          fetch-depth: 2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          list-files: none
          filters: |
            code:
              - 'apps/**/*.ts'
              - 'apps/**/*.tsx'
              - 'apps/**/*.js'
              - 'apps/**/*.jsx'
              - 'apps/**/*.mjs'
              - 'apps/**/*.cjs'
              - 'apps/**/*.json'
              - 'apps/**/*.css'
              - 'apps/**/*.html'
              - 'packages/**/*.ts'
              - 'packages/**/*.tsx'
              - 'packages/**/*.js'
              - 'packages/**/*.mjs'
              - 'packages/**/*.cjs'
              - 'packages/**/*.json'
              - 'packages/**/*.sql'
              - 'scripts/**'
              - 'tsconfig*.json'
            deps:
              - 'package.json'
              - 'bun.lock'
              - 'apps/*/*/package.json'
              - 'packages/*/*/package.json'
              - 'biome.json'
              - 'biome.jsonc'
              - 'knip.json'
              - 'knip.jsonc'
              - 'knip.ts'
            docs:
              # The docs drift-check (scripts/check-docs.ts) re-derives
              # router lists, cron schedules, provider directories, and
              # env-var coverage from source and diffs against the docs.
              # Run whenever EITHER side could have moved.
              - 'apps/frontend/docs/src/content/docs/reference/**'
              - 'apps/backend/worker/README.md'
              - '.env.example'
              - 'apps/backend/api/src/presentation/router*.ts'
              - 'apps/backend/api/src/presentation/routers/**'
              - 'apps/backend/data-provider/src/presentation/router*.ts'
              - 'apps/backend/data-provider/src/presentation/routers/**'
              - 'apps/backend/worker/src/processors/**'
              - 'packages/business/jobs/src/scheduled-jobs/**'
              - 'packages/business/jobs/src/user-jobs/**'
              - 'packages/clients/providers/src/providers/**'
              - 'scripts/check-docs.ts'
            mobile:
              - 'apps/mobile/**'
            # BEGIN auto:filters (generated by scripts/generate-ci-filters.ts — do not edit)
            cloud-client:
              - 'packages/clients/cloud-client/**'
            config:
              - 'packages/infra/config/**'
            db:
              - 'packages/infra/db/**'
            domain:
              - 'packages/business/domain/**'
            email:
              - 'packages/infra/email/**'
            file-import:
              - 'packages/business/file-import/**'
            http-fetch:
              - 'packages/infra/http-fetch/**'
            ingesters:
              - 'packages/business/ingesters/**'
            jobs:
              - 'packages/business/jobs/**'
            logging:
              - 'packages/infra/logging/**'
            providers:
              - 'packages/clients/providers/**'
            providers-google-sheets:
              - 'packages/clients/providers-google-sheets/**'
            queue:
              - 'packages/infra/queue/**'
            rate-limiter:
              - 'packages/infra/rate-limiter/**'
            realtime:
              - 'packages/infra/realtime/**'
            security:
              - 'packages/infra/security/**'
            shared:
              - 'packages/business/shared/**'
            storage:
              - 'packages/infra/storage/**'
            ui:
              - 'packages/frontend/ui/**'
            # END auto:filters
            data-provider:
              - 'apps/backend/data-provider/**'
            # Compiled-binary production guards live in @scani/config (the
            # getNodeEnv helper that defeats `bun build --compile --minify`
            # NODE_ENV substitution), @scani/cloud-client (https-in-prod
            # SCANI_CLOUD_URL check), and @scani/logging (LOG_ID_PEPPER
            # required-in-prod). Any change to those, the api Dockerfile,
            # or the api build script means the integration test below must
            # re-run from a fresh image.
            prod-guards:
              - 'packages/infra/config/**'
              - 'packages/clients/cloud-client/**'
              - 'packages/infra/logging/**'
              - 'packages/business/shared/src/utils/encryption.ts'
              - 'apps/backend/api/Dockerfile'
              - 'apps/backend/api/package.json'
              - 'apps/backend/api/src/config/**'
              - '.github/workflows/ci.yml'

  validate-code:
    name: Lint & Type Check
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun
      - name: Lint
        run: bun run lint
      - name: Type check
        run: bun run type-check
      - name: Design-token themes in sync
        run: bun scripts/generate-design-tokens.ts --check

  validate-deps:
    name: Deps sync & knip
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun
      - name: Dependency versions in sync
        run: bun run deps:lint
      - name: Unused code & dependencies (knip)
        run: bun run deps:unused
      - name: CI filter list in sync with workspaces
        run: bun run ci:gen:check

  validate-docs:
    name: Docs in sync with source
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docs == 'true' || needs.detect-changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun
      # scripts/check-docs.ts re-derives router lists, cron schedules,
      # provider directories, and env-var coverage from source and
      # compares against the published docs. Errors fail the build;
      # warnings (env-var coverage) print but don't block.
      - name: Check docs/source drift
        run: bun run docs:check

  test:
    name: Test
    needs: detect-changes
    # Run the full repo suite whenever any code or dependency changed.
    # The suite finishes in ~13s on the GH runner — much cheaper than
    # the per-package scoping it replaced, and immune to "PR only touches
    # apps/backend/api so test job skips entirely" gaps.
    if: ${{ needs.detect-changes.outputs.code == 'true' || needs.detect-changes.outputs.deps == 'true' }}
    runs-on: ubuntu-latest
    # Postgres is only booted when this job runs. `withTestDb` wraps each
    # test in a rolled-back transaction so tests share the schema but not
    # state. Redis is not needed — the rate-limiter falls through to its
    # in-memory queue when `sharedRedis` is unset.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scani
          POSTGRES_PASSWORD: scani
          POSTGRES_DB: scani
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U scani -d scani"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun
      - name: Run DB migrations
        # Seeds the schema + all required lookup rows (institutions,
        # institution_blockchain_mappings, token types) that repository
        # tests assume are present.
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable
      - name: Test
        # Preload + timeout come from `bunfig.toml` at the repo root —
        # the package.json `test` script restates them for clarity.
        run: bun run test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable

  e2e:
    # Full Playwright suite against the real docker-compose stack
    # (api + worker + data-provider + frontend + Postgres + Redis +
    # Mailpit + MinIO). Bypasses the `scripts/run.ts` orchestrator and
    # invokes `bunx playwright test` directly so the cache + artifact
    # steps can sit between stack-up and the test run — the orchestrator
    # would otherwise try to tear down a stack CI already owns.
    # STUB_AI=1 short-circuits OpenAI/Perplexity/DeepSeek calls in the
    # data-provider so screenshot-parse + AI-touching specs are
    # deterministic and don't need network keys.
    name: E2E (Playwright)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSE_PROJECT_NAME: mgrin-e2e-suite
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: ./.github/actions/setup-bun

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json') }}

      - name: Install Playwright Chromium + WebKit
        run: cd apps/e2e && bunx playwright install --with-deps chromium webkit

      - name: Start stack
        run: cp .env.example .env && bun dev:stack
        env:
          STUB_AI: "1"

      - name: Wait for stack health
        run: bun apps/e2e/scripts/wait-for-stack.ts

      - name: Run Playwright suite
        run: cd apps/e2e && bunx playwright test
        env:
          CI: "true"
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          API_BASE_URL: http://localhost:3011
          MAILPIT_URL: http://localhost:8026
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

      - name: Stop stack
        if: always()
        run: docker compose --profile full down -v

  prod-guards-integration:
    # Builds the api binary via the production Dockerfile and asserts
    # that compile-time NODE_ENV substitution can't disable the
    # `https://` requirement on SCANI_CLOUD_URL or the LOG_ID_PEPPER
    # required-in-prod check. This is the regression test for X-1: bun
    # build --compile --minify previously folded `process.env.NODE_ENV`
    # to its build-time value, leaving every production guard dead in
    # the artifact OSS users actually consume. Unit tests can't catch
    # this — they run under the bun interpreter, not the compiled
    # binary — so we have to bake an image and run it.
    name: Prod-guards integration (compiled api)
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.prod-guards == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Build api image (no cache, to catch substitution regressions)
        run: docker build --no-cache -f apps/backend/api/Dockerfile -t scani/api:ci-verify .

      - name: Start isolated Postgres + Redis on a dedicated network
        run: |
          set -euo pipefail
          docker network create x1-ci
          docker run -d --name x1-pg --network x1-ci \
            -e POSTGRES_USER=scani -e POSTGRES_PASSWORD=scani -e POSTGRES_DB=scani \
            postgres:16-alpine
          docker run -d --name x1-redis --network x1-ci redis:7-alpine
          until docker exec x1-pg pg_isready -U scani 2>/dev/null | grep -q accepting; do
            sleep 1
          done

      - name: Assert api rejects http:// public SCANI_CLOUD_URL in production
        run: |
          set -euo pipefail
          set +e
          docker run --rm --network x1-ci \
            -e NODE_ENV=production \
            -e DATABASE_URL='postgres://scani:scani@x1-pg:5432/scani?sslmode=disable' \
            -e REDIS_URL=redis://x1-redis:6379 \
            -e FRONTEND_URL=https://example.com \
            -e BACKEND_URL=https://example.com/api \
            -e "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" \
            -e "ENCRYPTION_KEY=$(openssl rand -hex 16)" \
            -e "JOBS_HMAC_SECRET=$(openssl rand -hex 32)" \
            -e "LOG_ID_PEPPER=$(openssl rand -hex 32)" \
            -e "SCANI_CLOUD_API_KEY=$(openssl rand -hex 32)" \
            -e 'SCANI_CLOUD_URL=http://public.example.com:8082' \
            -e PORT=3001 -e SERVICE_NAME=api \
            scani/api:ci-verify > out.log 2>&1
          status=$?
          set -e
          echo "::group::api output"
          cat out.log
          echo "::endgroup::"
          if [ "$status" -eq 0 ]; then
            echo "::error::api booted successfully with http://public.example.com:8082 in NODE_ENV=production. The X-1 NODE_ENV-substitution regression is back."
            exit 1
          fi
          if ! grep -q '@scani/cloud-client env misconfigured' out.log; then
            echo "::error::api crashed but not with the expected cloud-client misconfigured error — investigate."
            exit 1
          fi
          if ! grep -q 'must use https:// in production' out.log; then
            echo "::error::Missing the 'must use https:// in production' phrase in the error — the schema may have drifted."
            exit 1
          fi
          echo "✅ api correctly rejected http://public.example.com:8082"

      - name: Assert api rejects missing LOG_ID_PEPPER in production
        run: |
          set -euo pipefail
          set +e
          docker run --rm --network x1-ci \
            -e NODE_ENV=production \
            -e DATABASE_URL='postgres://scani:scani@x1-pg:5432/scani?sslmode=disable' \
            -e REDIS_URL=redis://x1-redis:6379 \
            -e FRONTEND_URL=https://example.com \
            -e BACKEND_URL=https://example.com/api \
            -e "BETTER_AUTH_SECRET=$(openssl rand -hex 32)" \
            -e "ENCRYPTION_KEY=$(openssl rand -hex 16)" \
            -e "JOBS_HMAC_SECRET=$(openssl rand -hex 32)" \
            -e "SCANI_CLOUD_API_KEY=$(openssl rand -hex 32)" \
            -e 'SCANI_CLOUD_URL=https://data-provider.example.com' \
            -e PORT=3001 -e SERVICE_NAME=api \
            scani/api:ci-verify > out.log 2>&1
          status=$?
          set -e
          echo "::group::api output"
          cat out.log
          echo "::endgroup::"
          if [ "$status" -eq 0 ]; then
            echo "::error::api booted successfully without LOG_ID_PEPPER in NODE_ENV=production."
            exit 1
          fi
          if ! grep -q 'LOG_ID_PEPPER' out.log; then
            echo "::error::api crashed but not with the expected LOG_ID_PEPPER error."
            exit 1
          fi
          echo "✅ api correctly rejected missing LOG_ID_PEPPER"

      - name: Tear down test infra
        if: always()
        run: |
          docker rm -f x1-pg x1-redis 2>/dev/null || true
          docker network rm x1-ci 2>/dev/null || true

  secret-scan:
    # Cheap + high-value: always runs so docs / workflow-only PRs can't
    # slip a leaked key through unchecked.
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - name: Secret scan
        run: |
          set -euo pipefail

          # Patterns target the actual secret shapes used in this monorepo.
          # When adding a new one: validate against a real value (rotate it
          # afterwards), test the regex doesn't fire on docs/test fixtures,
          # and prefer narrow shapes that won't fire on environment-variable
          # placeholder names in .env.example.
          PATTERNS=(
            # AWS access key + Render deploy hook
            'api\.render\.com/deploy/[A-Za-z0-9_-]+\?key=[A-Za-z0-9_-]{8,}'
            'AKIA[0-9A-Z]{16}'
            # Private keys (any flavor)
            '-----BEGIN (RSA |EC |OPENSSH |OPENPGP |)PRIVATE KEY-----'
            # Slack
            'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'
            # GitHub: classic + fine-grained PATs + OAuth/installation tokens
            'ghp_[A-Za-z0-9]{36,}'
            'github_pat_[A-Za-z0-9_]{82,}'
            'gho_[A-Za-z0-9]{36,}'
            'ghs_[A-Za-z0-9]{36,}'
            'ghu_[A-Za-z0-9]{36,}'
            # OpenAI + Anthropic API keys
            'sk-(proj-)?[A-Za-z0-9_\-]{40,}'
            'sk-ant-(api|sid)[0-9]{2}-[A-Za-z0-9_\-]{80,}'
            # Stripe live keys (test keys are sk_test_ — allow those)
            'sk_live_[0-9a-zA-Z]{24,}'
            'pk_live_[0-9a-zA-Z]{24,}'
            'rk_live_[0-9a-zA-Z]{24,}'
            # Sentry user + org auth tokens
            'sntrys_eyJ[A-Za-z0-9_\-]{40,}'
            'sntryu_[0-9a-f]{60,}'
            # Cloudflare API token (v4 shape)
            'cf_v1_[A-Za-z0-9_\-]{32,}'
            # Fastmail JMAP token (`fmu1-`/`fmm1-` prefix on token tokens)
            'fmu1-[a-zA-Z0-9]{6,}-[a-zA-Z0-9_-]+'
            'fmm1-[a-zA-Z0-9]{6,}-[a-zA-Z0-9_-]+'
            # Postgres connection string with credentials (Neon / generic)
            'postgres(ql)?://[A-Za-z0-9._%+\-]+:[^@\s/"<>]{8,}@[A-Za-z0-9._\-]+\.neon\.tech'
            'postgres(ql)?://[A-Za-z0-9._%+\-]+:[^@\s/"<>]{16,}@[A-Za-z0-9._\-]+'
            # Generic high-entropy JWT (kept tighter than before: at least
            # one dot before the long alphanum suffix)
            'eyJhbGciOi[A-Za-z0-9_\-]{40,}\.[A-Za-z0-9_\-]{40,}'
          )

          FAIL=0
          for p in "${PATTERNS[@]}"; do
            if grep -EnrI \
                --exclude-dir=node_modules \
                --exclude-dir=.git \
                --exclude-dir=dist \
                --exclude-dir=.next \
                --exclude-dir=docs \
                --exclude="bun.lock*" \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                --exclude="*.test.ts" \
                --exclude="*.test.tsx" \
                --exclude=".env.example" \
                -e "$p" . ; then
              echo "::error::Potential secret matched pattern: $p"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Secret scan failed. Rotate the exposed value and remove it from the commit."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"

  mobile-android:
    name: Mobile — Android build
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
      - name: Build + test shared and Android
        working-directory: apps/mobile
        # Linux runner: use the Android host unit-test task, NOT allTests
        # (iOS-simulator test targets can't build on Linux).
        run: ./gradlew :shared:testAndroidHostTest :android:assembleDebug --no-daemon

  mobile-ios:
    name: Mobile — iOS build
    needs: detect-changes
    if: needs.detect-changes.outputs.mobile == 'true'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate + build iOS app
        working-directory: apps/mobile/ios
        run: |
          xcodegen generate
          xcodebuild -project iosApp.xcodeproj -scheme iosApp \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO build

  # Single required status check named in the `main-protection` ruleset.
  # Always runs (so docs-only PRs don't trip "skipped == failed" gating)
  # and fails only when an upstream job actually failed or was cancelled.
  ci-success:
    name: CI Success
    needs:
      [
        detect-changes,
        validate-code,
        validate-deps,
        validate-docs,
        test,
        e2e,
        prod-guards-integration,
        secret-scan,
        mobile-android,
        mobile-ios,
      ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          echo "$NEEDS"
          if echo "$NEEDS" | grep -E '"result":[[:space:]]*"(failure|cancelled)"' > /dev/null; then
            echo "::error::A required CI job failed or was cancelled."
            exit 1
          fi
          echo "All required jobs passed or were skipped."
