name: CI

on:
  pull_request:
    branches: [main]
  workflow_call:

# Cancel in-flight CI runs for the same ref when a new push lands.
# Intentionally not applied to workflow_call — deploy depends on CI
# completing; cancelling mid-flight would race the deploy.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    # The repository test suite under packages/ uses `withTestDb` which
    # opens a real Postgres connection + wraps each test in a rolled-back
    # transaction. Locally the compose stack (`bun run dev:stack`)
    # provides Postgres on :5433; CI boots the same image + port here so
    # the same preload defaults work unchanged. Redis isn't required —
    # the rate-limiter falls through to its in-memory queue when
    # `sharedRedis` is unset, which is the case during tests.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: scani
          POSTGRES_PASSWORD: scani
          POSTGRES_DB: scani
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U scani -d scani"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-bun

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Dependency versions in sync
        run: bun run deps:lint

      - name: Unused code & dependencies (knip)
        run: bun run deps:unused

      - name: Run DB migrations
        # Seeds the schema + all required lookup rows (institutions,
        # institution_blockchain_mappings, token types) that repository
        # tests assume are present.
        run: bun run db:migrate
        env:
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable

      - name: Test
        run: bun test --preload ./packages/domain/test-preload.ts packages/ --timeout 30000
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://scani:scani@localhost:5433/scani?sslmode=disable

      - name: Secret scan
        run: |
          set -euo pipefail

          PATTERNS=(
            'api\.render\.com/deploy/[A-Za-z0-9_-]+\?key=[A-Za-z0-9_-]{8,}'
            'AKIA[0-9A-Z]{16}'
            '-----BEGIN (RSA |EC |OPENSSH |)PRIVATE KEY-----'
            'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'
            'eyJhbGciOi[A-Za-z0-9_\-]{100,}'
          )

          FAIL=0
          for p in "${PATTERNS[@]}"; do
            if grep -EnrI \
                --exclude-dir=node_modules \
                --exclude-dir=.git \
                --exclude-dir=dist \
                --exclude-dir=.next \
                --exclude="bun.lock*" \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                -e "$p" . ; then
              echo "::error::Potential secret matched pattern: $p"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Secret scan failed. Rotate the exposed value and remove it from the commit."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"
