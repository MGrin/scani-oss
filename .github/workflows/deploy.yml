name: Deploy to Render

on:
  push:
    branches:
      - main

# Ensure we wait for other workflows to complete
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Install dependencies for ruby-build
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libreadline-dev zlib1g-dev curl git

      - name: Install ruby-build
        run: |
          git clone https://github.com/rbenv/ruby-build.git
          ./ruby-build/install.sh

      - name: Build and install Ruby 3.2 to RUNNER_TOOL_CACHE
        env:
          RUNNER_TOOL_CACHE: /opt/hostedtoolcache
        run: |
          sudo ./ruby-build/bin/ruby-build 3.2 $RUNNER_TOOL_CACHE/Ruby/3.2/x64
          sudo touch $RUNNER_TOOL_CACHE/Ruby/3.2/x64.complete

      - name: Add Ruby to PATH
        run: |
          echo "/opt/hostedtoolcache/Ruby/3.2/x64/bin" >> $GITHUB_PATH

      - name: Confirm ruby version
        run: ruby --version

      - name: Run ruby/setup-ruby action
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2

  check-status:
    runs-on: self-hosted
    needs: [build]
    permissions:
      checks: read
      contents: read
    steps:
      - name: Wait for lint workflow
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Run Biome Linter'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      
      - name: Wait for type-check workflow
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Run TypeScript Type Checking'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  check-changes:
    runs-on: self-hosted
    needs: [check-status]  # Now depends on our own job instead of external workflows
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'apps/telegram-bot/**'
              - 'packages/shared/**'
              - 'packages/core/**'
            frontend:
              - 'apps/frontendV2/**'
              - 'packages/shared/**'
            landing:
              - 'apps/landing/**'

  deploy-backend:
    needs: [check-changes]
    if: ${{ needs.check-changes.outputs.backend == 'true' }}
    runs-on: self-hosted
    steps:
      - name: Trigger backend deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-d3j88295pdvs739osbig?key=dPrNCQrxecI

  deploy-frontend:
    needs: [check-changes]
    if: ${{ needs.check-changes.outputs.frontend == 'true' }}
    runs-on: self-hosted
    steps:
      - name: Trigger frontend deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-d3j8p37diees73fl6q30?key=UP2oMJ6B9Vo

  deploy-landing:
    needs: [check-changes]
    if: ${{ needs.check-changes.outputs.landing == 'true' }}
    runs-on: self-hosted
    steps:
      - name: Trigger landing deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-d3p8703uibrs738etau0?key=csrOYoHg-LE