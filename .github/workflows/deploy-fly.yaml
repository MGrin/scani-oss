name: Deploy

# Triggered by the Terraform workflow's completion (which runs on every
# main push). This sequencing guarantees that any GH Actions secrets
# Terraform creates in that same push — e.g. the S3_* and
# ADMIN_JOBS_HMAC_SECRET rows in github.tf — are visible to this workflow
# when it stages them onto Fly. When both workflows triggered directly
# from `push`, they ran in parallel and deploy-fly's secret context was
# snapshotted before Terraform's `apply` created the new secrets, which
# silently failed deploys.
on:
  workflow_run:
    workflows: ["Terraform"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: "Which services to deploy (comma-separated: backend,worker,data-provider,frontend,cloud-frontend,landing,admin). Ignored on push — that uses path filtering."
        required: false
        default: "backend,worker,data-provider,frontend,cloud-frontend,landing,admin"

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  # `contents: write` is needed by the post-smoke-test steps that
  # update the per-app `prod-<app>-last-known-good` git tags. Without
  # it, `git push origin <tag> --force` fails with 403 "Write access
  # to repository not granted". Other token capabilities stay
  # read-only.
  contents: write
  actions: read
  pull-requests: read

jobs:
  # Skip re-validation when the merge commit's PR already passed CI.
  # Direct pushes (no associated PR) and PRs without a successful CI run
  # still trigger validate as a safety net.
  check-ci-status:
    name: Check if PR CI already passed
    runs-on: ubuntu-latest
    # Abort the whole workflow if the upstream Terraform run failed.
    # Skipping the first job makes every `needs:`-chained job skip too.
    # workflow_dispatch bypasses this gate.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      validated: ${{ steps.check.outputs.validated }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          # When triggered via workflow_run, github.sha and the parent's
          # head_sha both point to the same commit, but be explicit so a
          # future trigger change doesn't silently look up the wrong SHA.
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          TRIGGER_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || github.event_name }}
        run: |
          set -uo pipefail
          # Only apply the skip-validation optimisation when the originating
          # event was a push to main (i.e. a merged PR). workflow_dispatch
          # and manual retriggers fall through to full validation.
          if [ "$TRIGGER_EVENT" != "push" ]; then
            echo "validated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          prs_json=$(gh api "repos/$REPO/commits/$SHA/pulls" 2>/dev/null || echo "[]")
          prs=$(echo "$prs_json" | jq -r '.[].number // empty')
          if [ -z "$prs" ]; then
            echo "No PR associated with $SHA — will run validation"
            echo "validated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          for pr in $prs; do
            head_sha=$(gh api "repos/$REPO/pulls/$pr" --jq '.head.sha' 2>/dev/null || echo "")
            if [ -z "$head_sha" ]; then
              continue
            fi
            success=$(gh api "repos/$REPO/actions/runs?head_sha=$head_sha&event=pull_request&status=success" \
              --jq '[.workflow_runs[] | select(.name == "CI")] | length' 2>/dev/null || echo 0)
            if [ "$success" -gt 0 ]; then
              echo "PR #$pr (head $head_sha) already has a successful CI run — skipping re-validation"
              echo "validated=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "No PR with a successful CI run found — will run validation"
          echo "validated=false" >> "$GITHUB_OUTPUT"

  validate:
    needs: check-ci-status
    if: ${{ needs.check-ci-status.outputs.validated != 'true' }}
    uses: ./.github/workflows/ci.yml

  # Path filter: on push, skip redeploying services whose code hasn't
  # changed. On workflow_dispatch, honor the `services` input instead.
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    needs: [check-ci-status, validate]
    if: ${{ always() && needs.check-ci-status.result == 'success' && (needs.validate.result == 'success' || needs.validate.result == 'skipped') }}
    outputs:
      backend: ${{ steps.resolve.outputs.backend }}
      worker: ${{ steps.resolve.outputs.worker }}
      data_provider: ${{ steps.resolve.outputs.data_provider }}
      frontend: ${{ steps.resolve.outputs.frontend }}
      cloud_frontend: ${{ steps.resolve.outputs.cloud_frontend }}
      landing: ${{ steps.resolve.outputs.landing }}
      admin: ${{ steps.resolve.outputs.admin }}
      migrations: ${{ steps.resolve.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      # paths-filter can't read `before` from a workflow_run payload and
      # otherwise only diffs the last commit, missing earlier commits in
      # a multi-commit push. Resolve HEAD~1 explicitly as the diff base.
      - id: base
        run: echo "sha=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          base: ${{ steps.base.outputs.sha }}
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          filters: |
            backend:
              - 'apps/backend/api/**'
              - 'packages/business/**'
              - 'packages/clients/**'
              - 'packages/infra/**'
            worker:
              - 'apps/backend/worker/**'
              - 'packages/business/**'
              - 'packages/clients/**'
              - 'packages/infra/**'
            data_provider:
              - 'apps/backend/data-provider/**'
              - 'packages/business/shared/**'
              - 'packages/clients/providers/**'
              - 'packages/infra/config/**'
              - 'packages/infra/email/**'
              - 'packages/infra/logging/**'
              - 'packages/infra/rate-limiter/**'
              - 'packages/infra/storage/**'
            frontend:
              - 'apps/frontend/app/**'
              - 'packages/frontend/ui/**'
              - 'packages/business/shared/**'
            cloud_frontend:
              - 'apps/frontend/cloud/**'
              - 'apps/backend/data-provider/**'
              - 'packages/frontend/ui/**'
            landing:
              - 'apps/frontend/landing/**'
            admin:
              - 'apps/frontend/admin/**'
            migrations:
              - 'packages/infra/db/src/migrations/**'
              # Bootstrap-wipe sentinel — its add/remove must trigger the
              # migrate job so the wipe runs (on add) and the cleanup PR
              # is verified end-to-end (on remove, migrate runs with no
              # wipe and a no-op apply).
              - 'packages/infra/db/.bootstrap-wipe'
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "backend=${{ contains(github.event.inputs.services, 'backend') }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ contains(github.event.inputs.services, 'worker') }}" >> "$GITHUB_OUTPUT"
            echo "data_provider=${{ contains(github.event.inputs.services, 'data-provider') }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ contains(github.event.inputs.services, 'frontend') }}" >> "$GITHUB_OUTPUT"
            echo "cloud_frontend=${{ contains(github.event.inputs.services, 'cloud-frontend') }}" >> "$GITHUB_OUTPUT"
            echo "landing=${{ contains(github.event.inputs.services, 'landing') }}" >> "$GITHUB_OUTPUT"
            echo "admin=${{ contains(github.event.inputs.services, 'admin') }}" >> "$GITHUB_OUTPUT"
            echo "migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
            echo "data_provider=${{ steps.filter.outputs.data_provider }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "cloud_frontend=${{ steps.filter.outputs.cloud_frontend }}" >> "$GITHUB_OUTPUT"
            echo "landing=${{ steps.filter.outputs.landing }}" >> "$GITHUB_OUTPUT"
            echo "admin=${{ steps.filter.outputs.admin }}" >> "$GITHUB_OUTPUT"
            echo "migrations=${{ steps.filter.outputs.migrations }}" >> "$GITHUB_OUTPUT"
          fi

  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    needs: detect-changes
    # `always()` bypasses GitHub's transitive-skip inheritance: without
    # it, if `validate` upstream is skipped (CI already passed on the
    # PR), this job implicitly inherits the skip and migrations never
    # run — exactly how PR #390 landed without applying 0049.
    if: ${{ always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.migrations == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      # Bootstrap-wipe gate: when packages/infra/db/.bootstrap-wipe exists,
      # drop+recreate the public schema BEFORE running migrations. Used
      # exactly once to reset prod after squashing the migration history
      # into a single 0000. The matching cleanup (delete the sentinel) is
      # a follow-up PR — leaving it in place will re-wipe prod on every
      # subsequent migration-touching deploy.
      - name: Bootstrap wipe (public + drizzle schemas)
        if: ${{ hashFiles('packages/infra/db/.bootstrap-wipe') != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
        run: |
          echo "::warning::bootstrap-wipe sentinel detected — dropping public + drizzle schemas on production"
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          # Drop BOTH `public` and `drizzle`. The `drizzle` schema holds
          # `__drizzle_migrations` — drizzle-orm's per-migration hash
          # tracker. If we leave it intact, the migrator on the next run
          # sees the old (squashed-away) migration hashes and decides
          # nothing needs applying, leaving public empty with no tables.
          # Neon doesn't expose a `postgres` role; the connecting user owns
          # whatever it CREATEs, so an explicit GRANT to that role isn't
          # needed. GRANT TO PUBLIC restores the historical default that
          # `public` schema is usable by all DB users.
          psql "$DATABASE_URL" \
            -v ON_ERROR_STOP=1 \
            -c "DROP SCHEMA IF EXISTS public CASCADE;" \
            -c "DROP SCHEMA IF EXISTS drizzle CASCADE;" \
            -c "CREATE SCHEMA public;" \
            -c "GRANT ALL ON SCHEMA public TO PUBLIC;"
      - name: Run migrations against Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
        run: bun run db:migrate

  deploy-data-provider:
    name: Deploy scani-data-provider
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate]
    if: ${{ always() && needs.detect-changes.outputs.data_provider == 'true' && !failure() }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # The data-provider is the only service that holds provider API keys
      # for AI, blockchain, pricing, email, storage + the tenant-scoped
      # DATA_PROVIDER_API_KEY the backend/worker authenticate with.
      - name: Stage secrets on scani-data-provider
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          DATA_PROVIDER_API_KEY: ${{ secrets.DATA_PROVIDER_API_KEY }}
          SENTRY_DSN_DATA_PROVIDER: ${{ secrets.SENTRY_DSN_DATA_PROVIDER }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          # AI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VISION_MODEL: ${{ secrets.OPENAI_VISION_MODEL }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_VISION_MODEL: ${{ secrets.DEEPSEEK_VISION_MODEL }}
          # Blockchain
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          HELIUS_API_KEY: ${{ secrets.HELIUS_API_KEY }}
          # Pricing
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          # Email
          FASTMAIL_API_TOKEN: ${{ secrets.FASTMAIL_API_TOKEN }}
          # Cloud management (Tier 2/3 only): enables cloud_api_keys DB
          # lookup, Postgres-backed `cloud_usage_events` metering, and
          # Better-Auth cookie sessions for cloud-frontend. DATABASE_URL
          # here is Neon's pooled URL (provisioned in
          # infra/terraform/github.tf as the `database_url` GH secret) —
          # the data-provider serves every backend+worker request and the
          # pooler avoids saturating Postgres connection slots.
          CLOUD_MANAGEMENT_ENABLED: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.CLOUD_BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: https://api.cloud.scani.xyz
          CLOUD_FRONTEND_ORIGIN: https://cloud.scani.xyz
          # Public origin this service is reachable on. Consumed by
          # buildOpenApiDocument() to fill the OpenAPI `servers[]` field
          # so generated docs/SDKs hit the right URL. Falls back to a
          # localhost URL constructed from HOST + PORT when unset.
          PUBLIC_BASE_URL: https://api.cloud.scani.xyz
          # Storage — staged as S3_* (the @scani/storage env shape).
          # GitHub secrets are stored under R2_* names; we alias here so
          # ops doesn't have to recreate them.
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          for var in DATA_PROVIDER_API_KEY SENTRY_DSN_DATA_PROVIDER REDIS_URL \
                     R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var" >&2
              exit 1
            fi
          done
          args=(
            DATA_PROVIDER_API_KEY="$DATA_PROVIDER_API_KEY"
            # Fly secrets override `[env]` in fly.toml, so we stage
            # NODE_ENV explicitly to defend against any stale or
            # incorrectly-set secret value carrying through. Without
            # this, machines were observed booting with
            # NODE_ENV=development and crashing on the env-isolation
            # guard (assertEnvIsolatedUrl rejects "remote URL but
            # NODE_ENV != production").
            NODE_ENV="production"
            SENTRY_DSN="$SENTRY_DSN_DATA_PROVIDER"
            SENTRY_ENVIRONMENT="production"
            SENTRY_RELEASE="${GITHUB_SHA}"
            SERVICE_VERSION="${GITHUB_SHA}"
            REDIS_URL="$REDIS_URL"
            S3_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
            S3_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
            S3_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
            S3_BUCKET="$R2_BUCKET"
          )
          for var in OPENAI_API_KEY OPENAI_VISION_MODEL \
                     PERPLEXITY_API_KEY \
                     DEEPSEEK_API_KEY DEEPSEEK_VISION_MODEL \
                     ETHERSCAN_API_KEY HELIUS_API_KEY \
                     COINGECKO_API_KEY FINNHUB_API_KEY \
                     GOOGLE_SERVICE_ACCOUNT_KEY GOOGLE_SHEETS_ID \
                     FASTMAIL_API_TOKEN \
                     CLOUD_MANAGEMENT_ENABLED DATABASE_URL \
                     BETTER_AUTH_SECRET BETTER_AUTH_URL CLOUD_FRONTEND_ORIGIN \
                     PUBLIC_BASE_URL; do
            if [ -n "${!var:-}" ]; then
              args+=("$var=${!var}")
              echo "  → staging $var"
            else
              echo "  ⊘ $var not set in GitHub Secrets — skipping"
            fi
          done
          flyctl secrets set --stage --app scani-data-provider "${args[@]}"

      - run: |
          # Strategy lives in fly.toml (rolling, max_unavailable=1) so
          # the two-machine replica set can swap one at a time without
          # blackholing backend + worker calls. Avoid passing --strategy
          # here — the CLI flag overrides the toml.
          flyctl deploy --remote-only \
            --config apps/backend/data-provider/fly.toml \
            --dockerfile apps/backend/data-provider/Dockerfile .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test /health
        # Step-level cap so a hung edge proxy or runaway curl loop
        # can't melt CI minutes the way the 2026-05-09 outage did.
        # Combined with `--max-time 10` per curl, this loop is at most
        # ~75s of wallclock time.
        timeout-minutes: 5
        run: |
          # --max-time bounds each curl so a hung edge proxy (502/503
          # storm) doesn't burn the GitHub Actions minute budget. Without
          # this the loop has stretched to 17min+ on a broken deploy
          # because each curl waits on the default connect timeout.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 https://scani-data-provider.fly.dev/health | jq -e '.status == "ok"' > /dev/null; then
              echo "data-provider healthy"; exit 0
            fi
            sleep 5
          done
          echo "data-provider /health smoke test failed:" >&2
          curl -s --max-time 10 https://scani-data-provider.fly.dev/health || true
          exit 1

      # Mark this commit as the last-known-good for data-provider. The
      # rollback workflow (.github/workflows/rollback.yaml) reads these
      # tags to redeploy a known-healthy image without needing the
      # operator to chase the right SHA in git log.
      - name: Tag last-known-good for data-provider
        run: |
          git tag -f prod-data-provider-last-known-good "$GITHUB_SHA"
          git push origin "prod-data-provider-last-known-good" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-backend:
    name: Deploy scani-backend
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate, deploy-data-provider]
    if: ${{ always() && needs.detect-changes.outputs.backend == 'true' && needs.migrate.result != 'failure' && (needs.deploy-data-provider.result == 'success' || needs.deploy-data-provider.result == 'skipped') }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # Stage new secrets before the deploy. `--stage` writes to Fly's
      # secret store without triggering a restart; the immediately-
      # following `flyctl deploy` picks them up on the new machine.
      # Pre-existing secrets (DATABASE_URL, REDIS_URL, ENCRYPTION_KEY,
      # BETTER_AUTH_SECRET) are already on Fly and intentionally NOT
      # re-staged here. Fail loud if any R2 / HMAC / Sentry is missing.
      # With the data-provider split, the backend only needs Scani-internal
      # secrets: DB, Redis, Better-Auth, HMAC, Sentry, and the two cloud
      # envs it uses to reach the data-provider. R2 creds stay here for
      # now as a belt-and-braces fallback if SCANI_CLOUD_URL is unset; the
      # env.ts guard makes them optional in cloud mode.
      - name: Stage core + cloud-client + Sentry secrets on scani-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ADMIN_JOBS_HMAC_SECRET: ${{ secrets.ADMIN_JOBS_HMAC_SECRET }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}
          # Reuse DATA_PROVIDER_API_KEY as backend's bearer — backend +
          # worker authenticate against the data-provider as Scani's own
          # internal infra (no per-tenant metering, hits the env-key
          # superuser path). Customers self-hosting Tier 2 set their own
          # `sk_live_*` key locally; this is the prod equivalent.
          SCANI_CLOUD_API_KEY: ${{ secrets.DATA_PROVIDER_API_KEY }}
        run: |
          set -euo pipefail
          # SCANI_CLOUD_URL is a public URL, hardcoded here so it doesn't
          # need to be a managed secret. Matches infra/terraform/main.tf's
          # `api_cloud_host` local + cloudflare.tf's `api_cloud` CNAME.
          SCANI_CLOUD_URL="https://api.cloud.scani.xyz"
          for var in ADMIN_JOBS_HMAC_SECRET SENTRY_DSN_BACKEND SCANI_CLOUD_API_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var" >&2
              exit 1
            fi
          done
          flyctl secrets set --stage --app scani-backend \
            ADMIN_JOBS_HMAC_SECRET="$ADMIN_JOBS_HMAC_SECRET" \
            NODE_ENV="production" \
            SENTRY_DSN="$SENTRY_DSN_BACKEND" \
            SENTRY_ENVIRONMENT="production" \
            SENTRY_RELEASE="${GITHUB_SHA}" \
            SERVICE_VERSION="${GITHUB_SHA}" \
            SCANI_CLOUD_URL="$SCANI_CLOUD_URL" \
            SCANI_CLOUD_API_KEY="$SCANI_CLOUD_API_KEY"

      - run: |
          flyctl deploy --remote-only \
            --config apps/backend/api/fly.toml \
            --dockerfile apps/backend/api/Dockerfile \
            --strategy immediate .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      # Deep health confirms DB + Redis + R2 + AI are all reachable — we pay
      # the cost of a broader check here specifically so the deploy fails
      # fast if anything's silently broken (like the R2-env-missing /
      # AI-keys-missing classes that took prod down in April 2026).
      - name: Smoke test /health/deep
        # Same rationale as the data-provider smoke test above.
        timeout-minutes: 5
        run: |
          # --max-time bounds each curl; same rationale as the
          # data-provider smoke test above.
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 https://api.scani.xyz/health/deep | jq -e '.status == "ok"' > /dev/null; then
              echo "Backend up with all dependencies healthy"; exit 0
            fi
            sleep 5
          done
          echo "Backend failed /health/deep smoke test:" >&2
          curl -s --max-time 10 https://api.scani.xyz/health/deep || true
          exit 1

      - name: Tag last-known-good for backend
        run: |
          git tag -f prod-backend-last-known-good "$GITHUB_SHA"
          git push origin "prod-backend-last-known-good" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-worker:
    name: Deploy scani-worker
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate, deploy-data-provider]
    if: ${{ always() && needs.detect-changes.outputs.worker == 'true' && needs.migrate.result != 'failure' && (needs.deploy-data-provider.result == 'success' || needs.deploy-data-provider.result == 'skipped') }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master

      # With the data-provider split, the worker no longer holds provider
      # API keys; all outbound calls (AI parse, chain RPC, pricing, R2,
      # email) route through the data-provider via the cloud-client.
      # DATABASE_URL, REDIS_URL, ENCRYPTION_KEY remain pre-existing on Fly
      # and intentionally untouched.
      - name: Stage core + cloud-client + Sentry secrets on scani-worker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          SENTRY_DSN_WORKER: ${{ secrets.SENTRY_DSN_WORKER }}
          # Same shape as backend — reuses DATA_PROVIDER_API_KEY so we
          # only manage one secret. SCANI_CLOUD_URL is hardcoded since
          # it's a public hostname (api.cloud.scani.xyz).
          SCANI_CLOUD_API_KEY: ${{ secrets.DATA_PROVIDER_API_KEY }}
        run: |
          set -euo pipefail
          SCANI_CLOUD_URL="https://api.cloud.scani.xyz"
          for var in SENTRY_DSN_WORKER SCANI_CLOUD_API_KEY; do
            if [ -z "${!var:-}" ]; then
              echo "::error::Missing required secret: $var" >&2
              exit 1
            fi
          done
          flyctl secrets set --stage --app scani-worker \
            NODE_ENV="production" \
            SENTRY_DSN="$SENTRY_DSN_WORKER" \
            SENTRY_ENVIRONMENT="production" \
            SENTRY_RELEASE="${GITHUB_SHA}" \
            SERVICE_VERSION="${GITHUB_SHA}" \
            SCANI_CLOUD_URL="$SCANI_CLOUD_URL" \
            SCANI_CLOUD_API_KEY="$SCANI_CLOUD_API_KEY"

      # `--ha=false` keeps a single primary machine — without it, fly.io
      # deploys a primary+standby pair. When the Terraform `scale count 1`
      # guardrail later destroys one machine, it can leave us with only the
      # standby, which stays stopped forever waiting for its now-deleted
      # primary to fail. That's how prod jobs silently stopped processing in
      # April 2026. Keep --ha=false for the worker.
      - run: |
          flyctl deploy --remote-only \
            --config apps/backend/worker/fly.toml \
            --dockerfile apps/backend/worker/Dockerfile \
            --ha=false \
            --strategy immediate .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      # Worker has no HTTP service for Fly to health-check, so `flyctl deploy`
      # doesn't automatically wait for the machine to reach `started`. If a
      # prior crash-loop exhausted the machine's restart budget, Fly leaves it
      # in `stopped` and the deploy returns success while no worker is
      # actually processing jobs. Force-start after every deploy as a
      # belt-and-braces step; it's a no-op when the machine is already up.
      - name: Ensure worker machine is running
        # Cap the poll loop. Internal deadline is 300s; this gives a 60s
        # buffer for cleanup. Without the cap, a Fly API hang during
        # the rolling deploy could leave this step running indefinitely.
        timeout-minutes: 6
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          # `flyctl machine status --json` was removed in recent flyctl — the
          # list endpoint already includes `state`, so pair id+state from one
          # call instead of a per-machine status lookup.
          #
          # State model: `started` is terminal-healthy. `stopped` / `suspended`
          # are terminal-unhealthy and we must force-start (this step's whole
          # reason for existence). `replacing` / `starting` / `created` /
          # `replacing_fromCreated` are transient mid-rollover states — Fly
          # rejects `machine start` on them with "machine getting replaced,
          # refusing to start". Poll for up to ~5 min so first-time image
          # pulls (which can take ~70s for the multi-stage Bun build) plus
          # firecracker boot have time to complete; then only force-start
          # if it's still in a terminal-unhealthy state. The previous 60 s
          # cap was tight enough to false-fail on cold-cache deploys.
          deadline=$(( $(date +%s) + 300 ))
          attempt=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            attempt=$((attempt + 1))
            pending=0
            while read -r mid state; do
              echo "machine $mid state=$state (attempt $attempt)"
              case "$state" in
                started)
                  ;;
                stopped|suspended)
                  flyctl machine start "$mid" --app scani-worker
                  ;;
                *)
                  pending=$((pending + 1))
                  ;;
              esac
            done < <(flyctl machine list --app scani-worker --json \
                       | jq -r '.[] | "\(.id) \(.state)"')
            if [ "$pending" -eq 0 ]; then
              echo "all machines settled"
              exit 0
            fi
            sleep 5
          done
          echo "::error::worker machine(s) stuck in transient state after 5 min"
          flyctl machine list --app scani-worker
          exit 1

      - name: Tag last-known-good for worker
        run: |
          git tag -f prod-worker-last-known-good "$GITHUB_SHA"
          git push origin "prod-worker-last-known-good" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-frontend:
    name: Deploy scani-frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.frontend == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: cd apps/frontend/app && bun run build
        env:
          VITE_API_URL: https://api.scani.xyz
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN_FRONTEND }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ github.sha }}
      - name: Upload frontend sourcemaps to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: scani-frontend
        run: |
          cd apps/frontend/app
          bunx @sentry/cli sourcemaps inject --release "${GITHUB_SHA}" ./dist
          bunx @sentry/cli sourcemaps upload --release "${GITHUB_SHA}" ./dist
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/frontend/app
          bunx wrangler@3 pages deploy dist \
            --project-name=scani-frontend \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}"

  deploy-landing:
    name: Deploy scani-landing (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.landing == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: cd apps/frontend/landing && bun run build
        env:
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN_LANDING }}
          VITE_SENTRY_ENVIRONMENT: production
          VITE_SENTRY_RELEASE: ${{ github.sha }}
      - name: Upload landing sourcemaps to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: scani-landing
        run: |
          cd apps/frontend/landing
          bunx @sentry/cli sourcemaps inject --release "${GITHUB_SHA}" ./dist
          bunx @sentry/cli sourcemaps upload --release "${GITHUB_SHA}" ./dist
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/frontend/landing
          bunx wrangler@3 pages deploy dist \
            --project-name=scani-landing \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}"

  deploy-cloud-frontend:
    name: Deploy scani-cloud (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.cloud_frontend == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Wait for scani-cloud Pages project (Terraform-managed)
        # Internal deadline is 30 × 10s = 5min; step cap gives a 1min
        # buffer for the Cloudflare API call jitter.
        timeout-minutes: 6
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          URL="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/scani-cloud"
          for i in $(seq 1 30); do
            code=$(curl -s --max-time 10 -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$URL")
            if [ "$code" = "200" ]; then
              echo "scani-cloud project is live"
              exit 0
            fi
            echo "($i/30) waiting for Terraform to create scani-cloud (got HTTP $code)..."
            sleep 10
          done
          echo "Timed out waiting for scani-cloud. Is the Terraform workflow healthy?" >&2
          exit 1
      - run: cd apps/frontend/cloud && bun run build
        env:
          # Cloud-frontend hits the data-provider at its dedicated
          # subdomain. Using the public origin directly (rather than a
          # same-origin rewrite through Pages) keeps the Better-Auth
          # session cookie scoped to api.cloud.scani.xyz, and both
          # hosts share the `scani.xyz` registrable domain so the
          # browser treats fetches as same-site for SameSite=Lax.
          VITE_DATA_PROVIDER_URL: https://api.cloud.scani.xyz
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/frontend/cloud
          bunx wrangler@3 pages deploy dist \
            --project-name=scani-cloud \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}"

  deploy-admin:
    name: Deploy scani-admin (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ always() && needs.detect-changes.result == 'success' && needs.detect-changes.outputs.admin == 'true' }}
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: cd apps/frontend/admin && bun run build:cf

      - name: Wait for scani-admin Pages project (Terraform-managed)
        # Internal deadline is 30 × 10s = 5min; step cap gives a 1min
        # buffer.
        timeout-minutes: 6
        run: |
          # The project is managed by cloudflare.tf. If the Terraform workflow
          # is still running on the same push, give it up to 5 minutes to
          # finish. Hitting the Pages API directly for a single project: 200
          # when it exists, 404 when it doesn't. Avoids wrangler's box-drawn
          # table output and the ~10s bunx cold-start per iteration.
          URL="https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/scani-admin"
          for i in $(seq 1 30); do
            code=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$URL")
            if [ "$code" = "200" ]; then
              echo "scani-admin project is live"
              exit 0
            fi
            echo "($i/30) waiting for Terraform to create scani-admin (got HTTP $code)..."
            sleep 10
          done
          echo "Timed out waiting for scani-admin. Is the Terraform workflow healthy?" >&2
          exit 1

      - name: Sync secrets from GitHub → Cloudflare Pages
        env:
          # Passkey (populated after bootstrap; skipped until set)
          ADMIN_BOOTSTRAP_TOKEN: ${{ secrets.ADMIN_BOOTSTRAP_TOKEN }}
          ADMIN_PASSKEY_CREDENTIAL_ID: ${{ secrets.ADMIN_PASSKEY_CREDENTIAL_ID }}
          ADMIN_PASSKEY_PUBLIC_KEY: ${{ secrets.ADMIN_PASSKEY_PUBLIC_KEY }}
          # HMAC key for all auth cookies (challenge + session). Persistent —
          # rotating it invalidates every logged-in session.
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          # Provider tokens (reused across services)
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
          TF_GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          FASTMAIL_API_TOKEN: ${{ secrets.FASTMAIL_API_TOKEN }}
          # BullMQ retry/remove: admin signs these → backend verifies with
          # the matching secret. Must equal the backend's Fly secret.
          ADMIN_JOBS_HMAC_SECRET: ${{ secrets.ADMIN_JOBS_HMAC_SECRET }}
          # Where the admin proxy sends signed requests. Hardcoded to prod
          # here; override per-env via GH environment secret if we ever
          # add staging.
          BACKEND_BASE_URL: https://api.scani.xyz
          # Sentry (admin runs as Next.js / @sentry/nextjs). `SENTRY_ORG`
          # is also needed at runtime by /services/sentry to query the
          # Sentry REST API from within Cloudflare Pages.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN_ADMIN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_ENVIRONMENT: production
        run: |
          cd apps/frontend/admin
          # Push every non-empty secret; Wrangler's `secret put` is upsert.
          sync_secret () {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "  → $name"
              printf '%s' "$value" | bunx wrangler@3 pages secret put "$name" --project-name=scani-admin
            else
              echo "  ⊘ $name (not set in GitHub, skipping)"
            fi
          }
          delete_secret_if_present () {
            local name="$1"
            bunx wrangler@3 pages secret delete "$name" --project-name=scani-admin --force 2>/dev/null || true
          }

          for n in FLY_API_TOKEN FLY_ORG NEON_API_KEY NEON_ORG_ID UPSTASH_EMAIL UPSTASH_API_KEY \
                   TF_GITHUB_TOKEN FASTMAIL_API_TOKEN \
                   ADMIN_PASSKEY_CREDENTIAL_ID ADMIN_PASSKEY_PUBLIC_KEY \
                   ADMIN_SESSION_SECRET \
                   ADMIN_JOBS_HMAC_SECRET BACKEND_BASE_URL \
                   NEXT_PUBLIC_SENTRY_DSN SENTRY_AUTH_TOKEN SENTRY_ORG \
                   SENTRY_RELEASE SENTRY_ENVIRONMENT; do
            sync_secret "$n" "${!n}"
          done

          # CLOUDFLARE_* are present on the runner but we mirror them as Pages
          # secrets so the /services/cloudflare page can call the CF API.
          sync_secret CLOUDFLARE_API_TOKEN "$CLOUDFLARE_API_TOKEN"
          sync_secret CLOUDFLARE_ACCOUNT_ID "$CLOUDFLARE_ACCOUNT_ID"

          if [ -n "$ADMIN_PASSKEY_CREDENTIAL_ID" ]; then
            echo "Passkey already provisioned → ensuring ADMIN_BOOTSTRAP_TOKEN is unset"
            delete_secret_if_present ADMIN_BOOTSTRAP_TOKEN
          else
            sync_secret ADMIN_BOOTSTRAP_TOKEN "$ADMIN_BOOTSTRAP_TOKEN"
          fi

      - name: Upload admin sourcemaps to Sentry
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: scani-admin
        run: |
          cd apps/frontend/admin
          bunx @sentry/cli sourcemaps inject --release "${GITHUB_SHA}" .vercel/output/static
          bunx @sentry/cli sourcemaps upload --release "${GITHUB_SHA}" .vercel/output/static

      - name: Publish to Cloudflare Pages
        run: |
          cd apps/frontend/admin
          bunx wrangler@3 pages deploy .vercel/output/static \
            --project-name=scani-admin \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}"
