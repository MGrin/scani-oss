name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      services:
        description: "Which services to deploy (comma-separated: backend,worker,frontend,landing,admin). Ignored on push — that uses path filtering."
        required: false
        default: "backend,worker,frontend,landing,admin"

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  # Path filter: on push, skip redeploying services whose code hasn't
  # changed. On workflow_dispatch, honor the `services` input instead.
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      backend: ${{ steps.resolve.outputs.backend }}
      worker: ${{ steps.resolve.outputs.worker }}
      frontend: ${{ steps.resolve.outputs.frontend }}
      landing: ${{ steps.resolve.outputs.landing }}
      admin: ${{ steps.resolve.outputs.admin }}
      migrations: ${{ steps.resolve.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 2 }
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'packages/core/**'
              - 'packages/shared/**'
              - 'packages/integrations/**'
              - 'packages/rate-limiter/**'
            worker:
              - 'apps/worker/**'
              - 'apps/cron/**'
              - 'packages/core/**'
              - 'packages/shared/**'
              - 'packages/integrations/**'
            frontend:
              - 'apps/frontendV2/**'
              - 'packages/shared/**'
            landing:
              - 'apps/landing/**'
            admin:
              - 'apps/admin/**'
            migrations:
              - 'packages/core/src/database/migrations/**'
      - id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "backend=${{ contains(github.event.inputs.services, 'backend') }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ contains(github.event.inputs.services, 'worker') }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ contains(github.event.inputs.services, 'frontend') }}" >> "$GITHUB_OUTPUT"
            echo "landing=${{ contains(github.event.inputs.services, 'landing') }}" >> "$GITHUB_OUTPUT"
            echo "admin=${{ contains(github.event.inputs.services, 'admin') }}" >> "$GITHUB_OUTPUT"
            echo "migrations=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> "$GITHUB_OUTPUT"
            echo "worker=${{ steps.filter.outputs.worker }}" >> "$GITHUB_OUTPUT"
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> "$GITHUB_OUTPUT"
            echo "landing=${{ steps.filter.outputs.landing }}" >> "$GITHUB_OUTPUT"
            echo "admin=${{ steps.filter.outputs.admin }}" >> "$GITHUB_OUTPUT"
            echo "migrations=${{ steps.filter.outputs.migrations }}" >> "$GITHUB_OUTPUT"
          fi

  migrate:
    name: Apply database migrations
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.migrations == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - name: Run migrations against Neon
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_DIRECT }}
        run: bun run db:migrate

  deploy-backend:
    name: Deploy scani-backend
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate]
    if: ${{ always() && needs.detect-changes.outputs.backend == 'true' && !failure() }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy --remote-only \
            --config apps/backend/fly.toml \
            --dockerfile apps/backend/Dockerfile \
            --strategy immediate .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Smoke test /health
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS https://api.scani.xyz/health; then
              echo "Backend up"; exit 0
            fi
            sleep 5
          done
          echo "Backend failed to come up" >&2; exit 1

  deploy-worker:
    name: Deploy scani-worker
    runs-on: ubuntu-latest
    needs: [detect-changes, migrate]
    if: ${{ always() && needs.detect-changes.outputs.worker == 'true' && !failure() }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: |
          flyctl deploy --remote-only \
            --config apps/worker/fly.toml \
            --dockerfile apps/worker/Dockerfile \
            --strategy immediate .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-frontend:
    name: Deploy scani-frontend (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: cd apps/frontendV2 && bun run build
        env:
          VITE_API_URL: https://api.scani.xyz
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/frontendV2
          bunx wrangler@latest pages deploy dist \
            --project-name=scani-frontend \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}"

  deploy-landing:
    name: Deploy scani-landing (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.landing == 'true' }}
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: cd apps/landing && bun run build
      - name: Publish to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd apps/landing
          bunx wrangler@latest pages deploy dist \
            --project-name=scani-landing \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}"

  deploy-admin:
    name: Deploy scani-admin (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.admin == 'true' }}
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-bun
      - run: cd apps/admin && bun run build:cf

      - name: Ensure Cloudflare Pages project exists
        run: |
          cd apps/admin
          if ! bunx wrangler@latest pages project list 2>/dev/null | grep -q '^scani-admin '; then
            bunx wrangler@latest pages project create scani-admin \
              --production-branch=main \
              --compatibility-date=2025-01-01 \
              --compatibility-flags=nodejs_compat
          else
            echo "scani-admin already exists"
          fi

      - name: Sync secrets from GitHub → Cloudflare Pages
        env:
          # Passkey + session (populated after bootstrap; skipped until set)
          ADMIN_BOOTSTRAP_TOKEN: ${{ secrets.ADMIN_BOOTSTRAP_TOKEN }}
          ADMIN_PASSKEY_CREDENTIAL_ID: ${{ secrets.ADMIN_PASSKEY_CREDENTIAL_ID }}
          ADMIN_PASSKEY_PUBLIC_KEY: ${{ secrets.ADMIN_PASSKEY_PUBLIC_KEY }}
          ADMIN_SESSION_SECRET: ${{ secrets.ADMIN_SESSION_SECRET }}
          # Provider tokens (reused across services)
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_ORG: ${{ secrets.FLY_ORG }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_ORG_ID: ${{ secrets.NEON_ORG_ID }}
          UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
          UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
          TF_GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
          FASTMAIL_API_TOKEN: ${{ secrets.FASTMAIL_API_TOKEN }}
        run: |
          cd apps/admin
          # Push every non-empty secret; Wrangler's `secret put` is upsert.
          # ADMIN_BOOTSTRAP_TOKEN is treated specially: if the passkey is
          # already provisioned we delete it (best-effort) so the bootstrap
          # route auto-locks even if the GH secret was left behind.
          sync_secret () {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "  → $name"
              printf '%s' "$value" | bunx wrangler@latest pages secret put "$name" --project-name=scani-admin
            else
              echo "  ⊘ $name (not set in GitHub, skipping)"
            fi
          }
          delete_secret_if_present () {
            local name="$1"
            bunx wrangler@latest pages secret delete "$name" --project-name=scani-admin --force 2>/dev/null || true
          }

          for n in FLY_API_TOKEN FLY_ORG NEON_API_KEY NEON_ORG_ID UPSTASH_EMAIL UPSTASH_API_KEY \
                   TF_GITHUB_TOKEN FASTMAIL_API_TOKEN \
                   ADMIN_PASSKEY_CREDENTIAL_ID ADMIN_PASSKEY_PUBLIC_KEY ADMIN_SESSION_SECRET; do
            sync_secret "$n" "${!n}"
          done

          # CLOUDFLARE_* are present on the runner but we mirror them as Pages
          # secrets so the /services/cloudflare page can call the CF API.
          sync_secret CLOUDFLARE_API_TOKEN "$CLOUDFLARE_API_TOKEN"
          sync_secret CLOUDFLARE_ACCOUNT_ID "$CLOUDFLARE_ACCOUNT_ID"

          if [ -n "$ADMIN_PASSKEY_CREDENTIAL_ID" ]; then
            echo "Passkey already provisioned → ensuring ADMIN_BOOTSTRAP_TOKEN is unset"
            delete_secret_if_present ADMIN_BOOTSTRAP_TOKEN
          else
            sync_secret ADMIN_BOOTSTRAP_TOKEN "$ADMIN_BOOTSTRAP_TOKEN"
          fi

      - name: Publish to Cloudflare Pages
        run: |
          cd apps/admin
          bunx wrangler@latest pages deploy .vercel/output/static \
            --project-name=scani-admin \
            --branch=main \
            --commit-dirty=true \
            --commit-hash="${GITHUB_SHA}"
