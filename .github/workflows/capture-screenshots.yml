name: Capture Landing Screenshots

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'App URL to capture screenshots from'
        required: false
        default: 'https://app.scani.xyz'

jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: apps/frontend/landing
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install chromium --with-deps

      - name: Capture screenshots
        working-directory: apps/frontend/landing
        env:
          SCANI_EMAIL: ${{ secrets.SCANI_DEMO_EMAIL }}
          SCANI_PASSWORD: ${{ secrets.SCANI_DEMO_PASSWORD }}
          SCANI_APP_URL: ${{ inputs.app_url }}
        run: bun run scripts/capture-landing-shots.ts

      - name: Commit screenshots
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add apps/frontend/landing/public/screenshots/
          git diff --staged --quiet || git commit -m 'landing: update screenshots [skip ci]'
          git push
