name: Security invariants

# Tiny grep-based assertions for invariants that have to hold across
# the codebase. Each gate is fast (≪1s) and runs on every push so we
# fail loud the moment one drifts. The intent is to encode
# "second-system rules" that are hard to express in a type system —
# e.g., "if any social-OAuth provider is enabled, the Better-Auth
# adapter must also be encryption-wrapped".

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  invariants:
    name: Security invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: C-01 — OAuth provider gating
        run: |
          set -euo pipefail
          AUTH_FILE="apps/backend/api/src/auth/better-auth.ts"
          # Detect any of the canonical Better-Auth social-provider
          # configuration keys. If one is present, the file MUST also
          # reference the encrypting adapter wrapper. We don't ship
          # OAuth today; this gate fails the PR that enables it
          # without also encrypting the OAuth token columns.
          if grep -E "(socialProviders|github\(|google\(|apple\(|microsoft\(|discord\(|facebook\(|twitter\()" \
              "$AUTH_FILE" >/dev/null; then
            if ! grep -q "encryptingAccountAdapter" "$AUTH_FILE"; then
              echo "::error file=$AUTH_FILE::OAuth provider configured without encryptingAccountAdapter wrapper — OAuth account tokens must round-trip through the encrypting adapter."
              exit 1
            fi
          fi

      - name: C-03 — log-id pepper guard
        run: |
          set -euo pipefail
          # The guard lives in the @scani/logging env loader: production
          # boot must refuse a missing/short LOG_ID_PEPPER. The
          # prod-NODE_ENV check is read through @scani/config's
          # isNodeEnvProduction() helper rather than a literal
          # `NODE_ENV === 'production'` so `bun --compile --minify` can't
          # inline it away (see N-1). Either form satisfies the guard,
          # plus the canonical helper name.
          CONFIG="packages/infra/logging/src/config.ts"
          if ! grep -q "LOG_ID_PEPPER" "$CONFIG" || ! grep -qE "(NODE_ENV === 'production'|isNodeEnvProduction)" "$CONFIG"; then
            echo "::error file=$CONFIG::LOG_ID_PEPPER prod-guard removed from the logging env loader. See C-03."
            exit 1
          fi
          # And pseudonymize.ts must source the pepper through that
          # validated loader, not a raw process.env read.
          CONSUMER="packages/infra/logging/src/pseudonymize.ts"
          if ! grep -q "loadLoggingConfig" "$CONSUMER"; then
            echo "::error file=$CONSUMER::pseudonymize.ts no longer reads LOG_ID_PEPPER via loadLoggingConfig(). See C-03."
            exit 1
          fi

      - name: A-01 — encryption prod-guard
        run: |
          set -euo pipefail
          FILE="packages/infra/security/src/encryption.ts"
          # `isProduction` was renamed to `isNodeEnvProduction` (see N-1).
          # Accept either spelling so the guard doesn't break across the
          # rename window — both bind to the same @scani/config helper.
          if ! grep -qE "isNodeEnvProduction|isProduction" "$FILE"; then
            echo "::error file=$FILE::encryption.ts lost its NODE_ENV=production guard. See A-01."
            exit 1
          fi
