name: Deploy to Render

on:
  push:
    branches:
      - main

# Ensure we wait for other workflows to complete
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: read
  contents: read

jobs:
  check-status:
    runs-on: ubuntu-latest
    permissions:
      checks: read
      contents: read
    steps:
      - name: Wait for lint workflow
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Run Biome Linter'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10
      
      - name: Wait for type-check workflow
        uses: lewagon/wait-on-check-action@v1.3.1
        with:
          ref: ${{ github.ref }}
          check-name: 'Run TypeScript Type Checking'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 10

  check-changes:
    runs-on: ubuntu-latest
    needs: [check-status]  # Now depends on our own job instead of external workflows
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      landing: ${{ steps.filter.outputs.landing }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'apps/cron/**'
              - 'packages/shared/**'
              - 'packages/core/**'
            frontend:
              - 'apps/frontendV2/**'
              - 'packages/shared/**'
            landing:
              - 'apps/landing/**'

  deploy-backend:
    needs: [check-changes]
    if: ${{ needs.check-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-d3j88295pdvs739osbig?key=dPrNCQrxecI

  deploy-frontend:
    needs: [check-changes]
    if: ${{ needs.check-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger frontend deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-d3j8p37diees73fl6q30?key=UP2oMJ6B9Vo

  deploy-landing:
    needs: [check-changes]
    if: ${{ needs.check-changes.outputs.landing == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Trigger landing deployment
        run: |
          curl -X POST https://api.render.com/deploy/srv-d3p8703uibrs738etau0?key=csrOYoHg-LE
