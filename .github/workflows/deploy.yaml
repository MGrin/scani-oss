name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Validate (reuses CI workflow) ────────────────────────────────────
  validate:
    uses: ./.github/workflows/ci.yml

  # ── Detect changes & deploy ──────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend:
              - 'apps/backend/**'
              - 'apps/cron/**'
              - 'packages/shared/**'
              - 'packages/core/**'
              - 'packages/integrations/**'
            frontend:
              - 'apps/frontendV2/**'
              - 'packages/shared/**'

      - name: Deploy backend
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          if [ -z "$RENDER_API_KEY" ]; then
            echo "RENDER_API_KEY secret is not set" >&2
            exit 1
          fi
          echo "Deploying backend..."
          curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            https://api.render.com/v1/services/srv-d3j88295pdvs739osbig/deploys

      - name: Deploy cron services
        if: steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Deploying cron services..."
          curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            https://api.render.com/v1/services/crn-d57rudmr433s73eta530/deploys
          curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            https://api.render.com/v1/services/crn-d57rt26r433s73et96s0/deploys

      - name: Deploy frontend
        if: steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
        run: |
          echo "Deploying frontend..."
          curl -fsS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            https://api.render.com/v1/services/srv-d3j8p37diees73fl6q30/deploys

      - name: Summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Deployed |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cron | ${{ steps.filter.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }} |" >> $GITHUB_STEP_SUMMARY
