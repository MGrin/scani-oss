name: Docker publish

# Builds and publishes multi-arch (amd64 + arm64) images for the four
# Scani services to Docker Hub under the `scani/` namespace:
#
#   scani/api               apps/backend/api/Dockerfile
#   scani/worker            apps/backend/worker/Dockerfile
#   scani/data-provider     apps/backend/data-provider/Dockerfile
#   scani/frontend-app      apps/frontend/app/Dockerfile
#
# Tagging:
#   - push to main                → `:latest` + `:sha-<short>`
#   - push tag `v*` (e.g. v1.2.3) → `:1.2.3`, `:1.2`, `:1`, `:latest`
#   - `workflow_dispatch`         → manual run, same tags as the
#                                   triggering branch
#   - `pull_request`              → build only (no push), sanity check
#                                   that Dockerfiles still build
#
# Required repo secrets (set under Settings → Secrets and variables →
# Actions):
#   - DOCKERHUB_USERNAME — typically `scani` (the org account)
#   - DOCKERHUB_TOKEN    — a Docker Hub access token with read/write
#                          on the four `scani/*` repos
#
# Image visibility: Docker Hub repos default to public on the free tier
# when created via push — no extra config required.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    # Only build on PRs that could actually change the image — Dockerfiles,
    # the nginx template, the lockfile, any workspace's package.json, or
    # this workflow itself. Code-only and docs-only PRs skip the 4×
    # multi-arch build entirely. main-push still rebuilds & publishes
    # everything on merge, so the smoke-test value is preserved.
    paths:
      - 'apps/backend/api/Dockerfile'
      - 'apps/backend/worker/Dockerfile'
      - 'apps/backend/data-provider/Dockerfile'
      - 'apps/frontend/app/Dockerfile'
      - 'apps/frontend/app/nginx.conf.template'
      - 'package.json'
      - 'bun.lock'
      - 'apps/*/*/package.json'
      - 'packages/*/*/package.json'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Per-ref so a fresh push to main supersedes an in-flight build, but a
  # tag push (release) runs alongside a main push.
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: apps/backend/api/Dockerfile
          - image: worker
            dockerfile: apps/backend/worker/Dockerfile
          - image: data-provider
            dockerfile: apps/backend/data-provider/Dockerfile
          - image: frontend-app
            dockerfile: apps/frontend/app/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation on amd64 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Route docker.io pulls through Google's anonymous mirror to dodge
          # Docker Hub's per-account 429 rate limit. Pushes still target
          # Docker Hub via docker/login-action below.
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to Docker Hub
        # Skip the login on pull_request from forks — secrets aren't
        # available and we're not pushing anyway.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: scani/${{ matrix.image }}
          tags: |
            # latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # short SHA on every push
            type=sha,prefix=sha-,format=short
            # branch name on branch pushes (excluding main since latest covers it)
            type=ref,event=branch,enable=${{ github.ref != 'refs/heads/main' }}
            # PR tag on pull_request (build-only, never pushed but still tagged)
            type=ref,event=pr
            # semver on tag pushes
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          # Push on every event EXCEPT pull_request (PRs build to verify
          # the Dockerfile still works; no Docker Hub login on PR runs).
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — keeps repeated builds fast.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          # Drop the unrelated attestation manifest from the package
          # list. provenance: false is the documented opt-out.
          provenance: false
          # For the frontend, pin the build-time VITE_API_URL to a
          # relative path. The nginx reverse-proxy inside the
          # frontend-app container handles `/api` → backend at runtime,
          # so the SPA can be deployed against any backend host without
          # rebuilding.
          build-args: |
            ${{ matrix.image == 'frontend-app' && 'VITE_API_URL=/api' || '' }}
