name: Docker publish

# Builds and publishes multi-arch (amd64 + arm64) images for the five
# Scani images to Docker Hub under the `scani/` namespace:
#
#   scani/api               apps/backend/api/Dockerfile
#   scani/worker            apps/backend/worker/Dockerfile
#   scani/data-provider     apps/backend/data-provider/Dockerfile
#   scani/frontend-app      apps/frontend/app/Dockerfile
#   scani/migrate           packages/infra/db/Dockerfile.migrate
#
# Tagging / publish behavior:
#   - push tag `v*` (e.g. v1.2.3) → push: `:1.2.3`, `:1.2`, `:1`, `:latest`
#   - `pull_request`              → build only (no push), sanity check
#                                   that Dockerfiles still build
#   - `workflow_dispatch` from a tag ref → same as a tag push (publish)
#   - `workflow_dispatch` from a branch → build only (no push); useful
#                                   for ad-hoc verification without
#                                   polluting Docker Hub
#
# Note: `main` pushes are intentionally not a trigger. Public Docker Hub
# releases are gated on `v*` tags (produced by release-please) so we keep
# tight control over what reaches consumers.
#
# Required repo secrets (set under Settings → Secrets and variables →
# Actions):
#   - DOCKERHUB_USERNAME — typically `scani` (the org account)
#   - DOCKERHUB_TOKEN    — a Docker Hub access token with read/write
#                          on the four `scani/*` repos
#
# Image visibility: Docker Hub repos default to public on the free tier
# when created via push — no extra config required.

on:
  push:
    tags: ['v*']
  pull_request:
    # Only build on PRs that could actually change the image — Dockerfiles,
    # the nginx template, the lockfile, any workspace's package.json, or
    # this workflow itself. Code-only and docs-only PRs skip the 4×
    # build entirely. The next `v*` tag push will still rebuild and
    # publish everything, so the PR build is purely a smoke test.
    paths:
      - 'apps/backend/api/Dockerfile'
      - 'apps/backend/worker/Dockerfile'
      - 'apps/backend/data-provider/Dockerfile'
      - 'apps/frontend/app/Dockerfile'
      - 'apps/frontend/app/nginx.conf.template'
      - 'packages/infra/db/Dockerfile.migrate'
      - 'packages/infra/db/src/**'
      - 'package.json'
      - 'bun.lock'
      - 'apps/*/*/package.json'
      - 'packages/*/*/package.json'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Per-ref so a re-run of the same tag supersedes an in-flight build,
  # while distinct tags / branches / PRs run independently.
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            dockerfile: apps/backend/api/Dockerfile
          - image: worker
            dockerfile: apps/backend/worker/Dockerfile
          - image: data-provider
            dockerfile: apps/backend/data-provider/Dockerfile
          - image: frontend-app
            dockerfile: apps/frontend/app/Dockerfile
          - image: migrate
            dockerfile: packages/infra/db/Dockerfile.migrate

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation on amd64 runners)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Route docker.io pulls through Google's anonymous mirror to dodge
          # Docker Hub's per-account 429 rate limit. Pushes still target
          # Docker Hub via docker/login-action below.
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to Docker Hub
        # Login only when we're actually going to push (tag pushes and
        # workflow_dispatch from a tag ref). PR builds and branch dispatches
        # are build-only and never need the registry credential.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: scani/${{ matrix.image }}
          # latest=auto (the default) attaches `:latest` to the highest
          # semver on tag-push events, and skips it on PR / branch builds.
          tags: |
            # PR tag on pull_request (build-only, never pushed)
            type=ref,event=pr
            # Branch ref on workflow_dispatch from a branch (build-only)
            type=ref,event=branch
            # semver on tag pushes
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          # Non-publishing runs (PRs, branch dispatches) only build amd64 as
          # a smoke test — arm64 via QEMU is ~5–10× slower and almost never
          # catches a bug amd64 didn't. Tag publishes still produce proper
          # multi-arch images.
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          # Push only on `v*` tag refs (tag pushes and workflow_dispatch
          # targeting a tag). Branch / PR runs build as a Dockerfile
          # smoke test and never publish.
          push: ${{ startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — keeps repeated builds fast.
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max
          # Drop the unrelated attestation manifest from the package
          # list. provenance: false is the documented opt-out.
          provenance: false
          # For the frontend, pin the build-time VITE_API_URL to a
          # relative path. The nginx reverse-proxy inside the
          # frontend-app container handles `/api` → backend at runtime,
          # so the SPA can be deployed against any backend host without
          # rebuilding.
          build-args: |
            ${{ matrix.image == 'frontend-app' && 'VITE_API_URL=/api' || '' }}
