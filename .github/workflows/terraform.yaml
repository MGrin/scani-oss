name: Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform.yaml"
  # On main we run for EVERY push, not just infra/terraform/** changes.
  # The deploy-fly workflow is chained via `workflow_run` and only fires
  # once this workflow completes — so terraform must run every time or
  # deploy-fly would never trigger. `terraform plan` on an unchanged
  # state is a ~30s no-op, an acceptable tax for the sequencing guarantee.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.event_name == 'pull_request' && github.ref || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_VERSION: "1.10.5"
  # Provider credentials — read from env by each provider's SDK.
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_ENDPOINT_URL_S3: ${{ secrets.R2_S3_ENDPOINT }}
  AWS_DEFAULT_REGION: auto
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
  UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
  # Input variables without defaults must be fed via TF_VAR_<name> — otherwise
  # Terraform blocks on stdin waiting for input and the job hangs indefinitely.
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_fly_api_token: ${{ secrets.FLY_API_TOKEN }}
  # Sentry auth token (`sntryu_...`) used by jianyuan/sentry to provision
  # projects + keys. Must be set as a GH secret before TF can plan/apply.
  TF_VAR_sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
  # Fail fast on any missing interactive prompt.
  TF_INPUT: "false"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: infra/terraform/.terraform
          key: ${{ runner.os }}-tf-${{ env.TF_VERSION }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tf-${{ env.TF_VERSION }}-

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: terraform fmt -check -recursive
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -lock-timeout=60s -out=tfplan
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const { execSync } = require('child_process');
            const out = execSync(
              'terraform show -no-color tfplan',
              { cwd: 'infra/terraform', encoding: 'utf8' }
            ).slice(0, 60000);
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: '```hcl\n' + out + '\n```',
            });

  apply:
    name: Apply
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v6

      - name: Cache Terraform providers
        uses: actions/cache@v5
        with:
          path: infra/terraform/.terraform
          key: ${{ runner.os }}-tf-${{ env.TF_VERSION }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tf-${{ env.TF_VERSION }}-

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # flyctl is invoked from the machine-count guardrail in fly.tf
      # (terraform_data.*_machine_count) via local-exec during apply.
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: terraform init -input=false

      # Idempotent self-healing imports. When a resource is added to TF that
      # already exists in the target system, `terraform apply` errors with
      # "already exists". Importing it into state first makes the next apply
      # a no-op refresh. Each `|| true` covers the steady-state case where
      # the resource is already in state (no-op), and the case where it
      # doesn't exist in the target yet (apply will create it).
      - name: Import pre-existing resources into state (one-shot)
        run: |
          set +e
          # scani-admin Pages project — created by the first deploy-admin run
          # before TF managed it.
          if ! terraform state list | grep -q '^cloudflare_pages_project\.admin$'; then
            terraform import -input=false \
              cloudflare_pages_project.admin \
              "${TF_VAR_cloudflare_account_id}/scani-admin" || true
          fi
          exit 0

      - run: terraform apply -auto-approve -input=false -lock-timeout=60s
