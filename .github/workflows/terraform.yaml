name: Terraform

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - "infra/r2/**"
      - ".github/workflows/terraform.yaml"
  # On main we run for EVERY push, not just infra/terraform/** changes.
  # The deploy-fly workflow is chained via `workflow_run` and only fires
  # once this workflow completes — so terraform must run every time or
  # deploy-fly would never trigger. `terraform plan` on an unchanged
  # state is a ~30s no-op, an acceptable tax for the sequencing guarantee.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: terraform-${{ github.event_name == 'pull_request' && github.ref || 'main' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TF_VERSION: "1.10.5"
  # Provider credentials — read from env by each provider's SDK.
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_ENDPOINT_URL_S3: ${{ secrets.R2_S3_ENDPOINT }}
  AWS_DEFAULT_REGION: auto
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
  UPSTASH_EMAIL: ${{ secrets.UPSTASH_EMAIL }}
  UPSTASH_API_KEY: ${{ secrets.UPSTASH_API_KEY }}
  GITHUB_TOKEN: ${{ secrets.TF_GITHUB_TOKEN }}
  # Input variables without defaults must be fed via TF_VAR_<name> — otherwise
  # Terraform blocks on stdin waiting for input and the job hangs indefinitely.
  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_fly_api_token: ${{ secrets.FLY_API_TOKEN }}
  # Sentry auth token (`sntryu_...`) used by jianyuan/sentry to provision
  # projects + keys. Must be set as a GH secret before TF can plan/apply.
  TF_VAR_sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
  # Sentry org slug. Has a default in variables.tf, but the shell-level
  # `terraform import` commands in the one-shot step can't read TF
  # defaults, so we surface it here too.
  TF_VAR_sentry_org: ${{ secrets.SENTRY_ORG }}
  # Fail fast on any missing interactive prompt.
  TF_INPUT: "false"

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Cache Terraform providers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: infra/terraform/.terraform
          key: ${{ runner.os }}-tf-${{ env.TF_VERSION }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tf-${{ env.TF_VERSION }}-

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - run: terraform fmt -check -recursive
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -lock-timeout=60s -out=tfplan
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { execSync } = require('child_process');
            // Cap at 12 KB. The previous 60 KB ceiling was chosen for
            // "I want to see everything in the comment" — but anything
            // approaching that size is a TF refactor that should be
            // reviewed in the workflow log, not in a single PR
            // comment. Keeping the cap small also limits the surface
            // area for the sanitization below.
            const MAX_BODY = 12_000;
            let out = execSync(
              'terraform show -no-color tfplan',
              { cwd: 'infra/terraform', encoding: 'utf8' }
            );

            // Sanitize content before posting:
            //   1. Strip embedded ``` so an attacker-authored resource
            //      `description = "```\nphishing link\n```"`
            //      can't break out of the fenced block and inject raw
            //      Markdown / phishing links into the comment body.
            //   2. Strip HTML angle brackets — GitHub renders raw HTML
            //      from issue comments in some surfaces (notifications,
            //      RSS); a TF string containing `<img src=...>` could
            //      smuggle a tracking pixel onto a maintainer's review.
            //   3. Hard truncate before fencing.
            out = out
              .replace(/`/g, 'ˋ')     // backtick → modifier letter grave accent
              .replace(/[<>]/g, (m) => (m === '<' ? '&lt;' : '&gt;'));
            const truncated = out.length > MAX_BODY;
            if (truncated) out = out.slice(0, MAX_BODY);

            const footer = truncated
              ? `\n\n_…truncated at ${MAX_BODY.toLocaleString()} chars; full plan in the workflow log._`
              : '';

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: '```hcl\n' + out + '\n```' + footer,
            });

  apply:
    name: Apply
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: plan
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0

      - name: Cache Terraform providers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: infra/terraform/.terraform
          key: ${{ runner.os }}-tf-${{ env.TF_VERSION }}-${{ hashFiles('infra/terraform/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-tf-${{ env.TF_VERSION }}-

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      # flyctl is invoked from the machine-count guardrail in fly.tf
      # (terraform_data.*_machine_count) via local-exec during apply.
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master @ 2026-05-12

      - run: terraform init -input=false

      # Idempotent self-healing imports. When a resource is added to TF that
      # already exists in the target system, `terraform apply` errors with
      # "already exists". Importing it into state first makes the next apply
      # a no-op refresh. Each `|| true` covers the steady-state case where
      # the resource is already in state (no-op), and the case where it
      # doesn't exist in the target yet (apply will create it).
      - name: Import pre-existing resources into state (one-shot)
        run: |
          set +e
          # scani-admin Pages project — created by the first deploy-admin run
          # before TF managed it.
          if ! terraform state list | grep -q '^cloudflare_pages_project\.admin$'; then
            terraform import -input=false \
              cloudflare_pages_project.admin \
              "${TF_VAR_cloudflare_account_id}/scani-admin" || true
          fi
          # scani-frontend and scani-landing Pages projects — existed before
          # Terraform took ownership (2026-04-19 stability PR).
          if ! terraform state list | grep -q '^cloudflare_pages_project\.frontend$'; then
            terraform import -input=false \
              cloudflare_pages_project.frontend \
              "${TF_VAR_cloudflare_account_id}/scani-frontend" || true
          fi
          if ! terraform state list | grep -q '^cloudflare_pages_project\.landing$'; then
            terraform import -input=false \
              cloudflare_pages_project.landing \
              "${TF_VAR_cloudflare_account_id}/scani-landing" || true
          fi
          # Sentry `scani` team — auto-created with the Sentry org, so we
          # adopt it instead of trying to CREATE a duplicate. Import ID
          # format for jianyuan/sentry is `<org-slug>/<team-slug>`.
          if ! terraform state list | grep -q '^sentry_team\.scani$'; then
            terraform import -input=false \
              sentry_team.scani \
              "${TF_VAR_sentry_org}/scani" || true
          fi
          exit 0

      - run: terraform apply -auto-approve -input=false -lock-timeout=60s

      # R2 bucket CORS. The cloudflare v4 Terraform provider does not yet
      # expose a CORS resource for R2 (same story as the bucket lifecycle
      # rules noted in cloudflare.tf), so the JSON at infra/r2/ is the
      # source of truth and we apply it post-TF via wrangler. Idempotent:
      # wrangler overwrites the existing rule set each run. Fixing this
      # in CI means manual `wrangler cors set` runs can't silently drift
      # from what's checked in.
      - name: Apply R2 bucket CORS policies
        working-directory: infra/r2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@3 r2 bucket cors set scani-job-uploads \
            --file scani-job-uploads-cors.json -y
