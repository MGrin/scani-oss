name: Secret Scan

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Lightweight regex-based secret scanning. Not a replacement for a full
# secret-scanning service, but catches the class of mistake that caused
# the previous Render deploy-key leak (keys committed inline in workflows,
# curl commands, or source files).
#
# Full scans via Trufflehog/Gitleaks can be added later; this keeps the
# dependency surface small while giving us a hard gate on commit.

jobs:
  secret-scan:
    name: Scan for hardcoded secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secret patterns
        run: |
          set -euo pipefail

          # Patterns: obvious secret formats we never want in source.
          # NOTE: extend cautiously — false positives here block merges.
          PATTERNS=(
            # Render deploy hooks of the form ?key=<20+ char>
            'api\.render\.com/deploy/[A-Za-z0-9_-]+\?key=[A-Za-z0-9_-]{8,}'
            # AWS-style access key IDs
            'AKIA[0-9A-Z]{16}'
            # Generic "BEGIN PRIVATE KEY" blocks
            '-----BEGIN (RSA |EC |OPENSSH |)PRIVATE KEY-----'
            # Slack bot tokens
            'xoxb-[0-9]+-[0-9]+-[A-Za-z0-9]+'
            # Supabase service-role JWT prefix (typical length >= 100)
            'eyJhbGciOi[A-Za-z0-9_\-]{100,}'
          )

          FAIL=0
          for p in "${PATTERNS[@]}"; do
            if grep -EnrI \
                --exclude-dir=node_modules \
                --exclude-dir=.git \
                --exclude-dir=dist \
                --exclude-dir=.next \
                --exclude="bun.lock*" \
                --exclude="*.lock" \
                --exclude="*.map" \
                --exclude="*.min.js" \
                -e "$p" . ; then
              echo "::error::Potential secret matched pattern: $p"
              FAIL=1
            fi
          done

          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Secret scan failed. Rotate the exposed value and remove it from the commit."
            exit 1
          fi

          echo "✅ No hardcoded secrets detected"
