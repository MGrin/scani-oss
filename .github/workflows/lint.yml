name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Run Biome Linter
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint on backend
        run: bun run lint:backend

      - name: Run lint on frontend
        run: bun run lint:frontend

      - name: Run lint on landing
        run: bun run lint:landing

      - name: Run lint on mobile
        run: bun run lint:mobile

      - name: Run lint on telegram-bot
        run: bun run lint:telegram-bot

      - name: Run lint on shared
        run: bun run lint:shared

      - name: Run lint on core
        run: bun run lint:core

