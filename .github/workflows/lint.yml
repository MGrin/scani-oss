name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Run Biome Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies for canvas
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint on backend
        run: bun run lint:backend

      - name: Run lint on frontend
        run: bun run lint:frontend

      - name: Run lint on landing
        run: bun run lint:landing

      - name: Run lint on telegram-bot
        run: bun run lint:telegram-bot

      - name: Run lint on shared
        run: bun run lint:shared

      - name: Run lint on core
        run: bun run lint:core

      - name: Run lint on integrations
        run: bun run lint:integrations

      - name: Run lint on rate-limiter
        run: bun run lint:rate-limiter

      - name: Run lint on scripts
        run: bun run lint:scripts

      # Note: Mobile app is excluded as it's a React Native/Expo app
      # that requires its own dependency installation and has a separate build process.
      # To lint mobile, run: cd apps/mobile && bun install && bun run lint

